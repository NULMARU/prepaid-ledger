<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1f4e79">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>선입금대장</title>
<style>
:root{--bg:#f4f6f8;--card:#fff;--line:#d7dde4;--text:#1f2933;--muted:#66788a;--primary:#1f4e79;--primary-soft:#eaf2f8;--danger:#b42318;--danger-soft:#fdecec;--warn:#b54708;--warn-soft:#fff4e5;--success:#0b7a4b;--shadow:0 8px 24px rgba(15,23,42,.08);--radius:16px}
*{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:"Malgun Gothic","Apple SD Gothic Neo",sans-serif}body{min-height:100vh}button,input,select{font:inherit}button{border:none;cursor:pointer;border-radius:14px;min-height:56px}input,select{width:100%;min-height:56px;padding:14px 16px;border:2px solid var(--line);border-radius:14px;background:#fff}
.app{max-width:900px;margin:0 auto;padding:16px 16px 96px}.top{position:sticky;top:0;z-index:10;background:rgba(244,246,248,.96);backdrop-filter:blur(8px);padding:16px 0 12px}.title{display:flex;gap:10px;align-items:start;justify-content:space-between}.title h1{margin:0;font-size:24px}.sub{margin-top:4px;color:var(--muted);font-size:14px}.tool{display:flex;gap:8px;flex-wrap:wrap}.tool button{min-height:44px;padding:0 14px;font-size:15px;font-weight:800}
.btn{background:#fff;border:2px solid var(--line);color:var(--text)}.btn-primary{background:var(--primary);color:#fff;border:2px solid var(--primary)}.btn-secondary{background:var(--primary-soft);color:var(--primary);border:2px solid #c9dced}.btn-danger{background:var(--danger);color:#fff;border:2px solid var(--danger)}.btn-warn{background:var(--warn-soft);color:var(--warn);border:2px solid #f0d1ad}
.stack{display:grid;gap:12px}.card{background:var(--card);border:1px solid rgba(215,221,228,.9);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}.banner.warn{background:var(--warn-soft);border-color:#f0d1ad}.banner.error{background:var(--danger-soft);border-color:#f5c9c4}
.group{display:grid;gap:10px}.group-head{display:flex;justify-content:space-between;gap:12px;align-items:center;padding-bottom:8px;border-bottom:1px solid #eef1f4}.group-title{font-size:22px;font-weight:800}.group-meta{color:var(--muted);font-size:14px}
.employee{display:grid;gap:12px}.employee-main{cursor:pointer}.name{font-size:20px;font-weight:800;line-height:1.4}.dept,.meta,.note{color:var(--muted);font-size:14px;line-height:1.5}.bal{margin-top:10px;font-size:30px;font-weight:800;color:var(--primary)}.bal.zero{color:#98a2b3}.bal.negative{color:var(--danger)}
.actions{display:flex;gap:8px;flex-wrap:wrap}.actions button{flex:1;min-width:120px;font-size:18px;font-weight:800}.summary{display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:18px;font-weight:800}.summary .v{color:var(--primary);font-size:22px}.empty{text-align:center;color:var(--muted);padding:28px 16px;line-height:1.6}
.list{display:grid;gap:10px}.txn{display:grid;gap:8px}.txn-top{display:flex;justify-content:space-between;gap:10px;align-items:start}.txn-title{font-size:18px;font-weight:800;line-height:1.4}.amt{font-size:22px;font-weight:800;white-space:nowrap}.amt.in{color:var(--success)}.amt.out{color:var(--danger)}.amt.adjust{color:var(--warn)}
.chips{display:flex;gap:8px;flex-wrap:wrap;font-size:13px;color:var(--muted)}.chip{padding:5px 9px;border-radius:999px;background:var(--primary-soft);color:var(--primary);font-weight:700}.thumb{width:88px;height:48px;object-fit:contain;border:1px solid var(--line);border-radius:10px;background:#fff;cursor:pointer}
.row{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid #eef1f4}.row:last-child{border-bottom:0}.row .left{flex:1;min-width:0}.row .right{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}.small{min-height:40px;padding:0 10px;border:2px solid var(--line);background:#fff;font-size:14px;font-weight:800;border-radius:10px}
.hidden-badge{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;background:#eef1f4;color:var(--muted);font-size:12px;font-weight:800;margin-left:6px}
.nav{position:fixed;left:0;right:0;bottom:0;max-width:900px;margin:0 auto;display:flex;background:rgba(255,255,255,.98);border-top:1px solid rgba(215,221,228,.95);z-index:20;padding-bottom:env(safe-area-inset-bottom,0)}.nav button{flex:1;min-height:72px;border-radius:0;background:transparent;color:#98a2b3;font-size:16px;font-weight:800}.nav button.active{color:var(--primary);background:#f8fbfd}
.modal-back{position:fixed;inset:0;background:rgba(15,23,42,.56);display:flex;align-items:center;justify-content:center;padding:16px;z-index:40}.modal{width:min(100%,720px);max-height:calc(100vh - 32px);overflow:auto;background:#fff;border-radius:20px;box-shadow:0 24px 60px rgba(15,23,42,.28);padding:20px}.modal h2{margin:0 0 8px;font-size:24px}.help{margin:0 0 16px;color:var(--muted);line-height:1.6}
.field{display:grid;gap:6px}.field label{font-size:14px;color:var(--muted);font-weight:800}.form{display:grid;gap:12px}.quick{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.quick button{font-size:18px;font-weight:800;background:var(--primary-soft);color:var(--primary);border:2px solid #c9dced}
.receipt{display:grid;gap:8px;padding:12px;border:2px dashed var(--line);border-radius:16px;background:#fbfcfd;margin-bottom:12px}.receipt-row{display:flex;justify-content:space-between;gap:12px;font-size:15px}
.signature{width:100%;height:180px;display:block;background:#fff;touch-action:none}.sig-box{border:2px solid var(--line);border-radius:16px;overflow:hidden}
.modal-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}.modal-actions button{flex:1;font-size:18px;font-weight:800}
.toast{position:fixed;left:50%;top:14px;transform:translateX(-50%);max-width:calc(100vw - 24px);padding:14px 18px;border-radius:14px;background:rgba(31,41,51,.96);color:#fff;box-shadow:var(--shadow);z-index:60;text-align:center;line-height:1.5}
.busy{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.68);z-index:70}.busy>div{background:#fff;padding:24px;border-radius:18px;box-shadow:var(--shadow);font-size:18px;font-weight:800;text-align:center}
.csv-preview{max-height:280px;overflow-y:auto;margin:12px 0;border:1px solid var(--line);border-radius:12px}.csv-table{width:100%;border-collapse:collapse;font-size:13px}.csv-table th{background:var(--primary);color:#fff;padding:8px;text-align:left;position:sticky;top:0}.csv-table td{padding:6px 8px;border-bottom:1px solid #eef1f4}.csv-table tr.err{background:var(--danger-soft)}.csv-table tr.err td{color:var(--danger)}
.dept-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;background:var(--primary-soft);color:var(--primary);font-size:13px;font-weight:700;margin:3px}.dept-tag button{background:none;border:none;color:var(--danger);font-size:16px;min-height:auto;padding:0 2px;cursor:pointer;border-radius:0}
@media(max-width:640px){.quick{grid-template-columns:1fr}.actions button,.modal-actions button{min-width:100%}.summary,.txn-top,.receipt-row,.row,.group-head{display:grid}.tool{width:100%}.tool button{flex:1}}
</style>
</head>
<body>
<div id="app"></div>
<input id="restoreFile" type="file" accept="application/json,.json" hidden>
<input id="csvFile" type="file" accept=".csv,.txt" hidden>
<script>
(()=>{
'use strict';
const APP='선입금대장',APP_VERSION='2.0.0',DB='prepaid-ledger-db',VER=2,LOCAL='prepaid-ledger-local',now=()=>Date.now(),qs=i=>document.getElementById(i);
const DEFAULT_ORG='광진구청';
const DEFAULT_DEPTS=['구민','구청장','부구청장','감사담당관','홍보담당관','행정지원국','행정지원과','자치행정과','민원여권과','재무과','스마트정보과','기획경제국','기획예산과','지역경제과','일자리청년과','세무1과','세무2과','문화교육국','문화예술과','체육진흥과','교육지원과','평생교육과','복지국','복지정책과','사회복지장애인과','어르신복지과','가정복지과','아동청소년과','안전환경국','도시안전과','청소과','환경과','가로경관과','미래도시국','주택과','주거사업과','도시계획과','건축과','부동산정보과','교통건설국','교통행정과','교통지도과','도로과','치수과','공원녹지과','보건소','보건정책과','보건위생과','보건의료과','건강관리과','보건지소','동주민센터','중곡1동','중곡2동','중곡3동','중곡4동','능동','구의1동','구의2동','구의3동','광장동','자양1동','자양2동','자양3동','자양4동','화양동','군자동'];
const state={loaded:false,mode:'준비 중',screen:'home',search:'',historyEmployeeId:'',modal:null,toast:'',toastTimer:null,busy:'',data:{employees:[],transactions:[],meta:{lastBackupAt:null,orgName:DEFAULT_ORG,departments:[...DEFAULT_DEPTS]}}};
let repo,signPad=null;
document.addEventListener('click',onClick);document.addEventListener('input',onInput);document.addEventListener('change',onInput);qs('restoreFile').addEventListener('change',onRestoreFile);qs('csvFile').addEventListener('change',onCsvFile);
let composing=false;document.addEventListener('compositionstart',()=>{composing=true});document.addEventListener('compositionend',(e)=>{composing=false;onInput(e)});
init();

// ── 유틸리티 ──
function num(v){const n=Number(v);return Number.isFinite(n)?n:0}
function numTime(v){const n=Number(v);return Number.isFinite(n)&&n>0?n:now()}
function str(v){return typeof v==='string'?v.trim():''}
function sigD(v){return typeof v==='string'&&/^data:image\//.test(v)?v:''}
function uid(){return 'id-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,9)}
function esc(v){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function money(v){return num(v).toLocaleString('ko-KR')+'원'}
function dt(ts){if(!ts)return '-';const d=new Date(ts),y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0'),h=String(d.getHours()).padStart(2,'0'),mi=String(d.getMinutes()).padStart(2,'0');return `${y}.${m}.${dd} ${h}:${mi}`}
function sameDay(a,b){if(!a||!b)return false;const x=new Date(a),y=new Date(b);return x.getFullYear()===y.getFullYear()&&x.getMonth()===y.getMonth()&&x.getDate()===y.getDate()}
function groupBy(items,fn){const m=new Map();items.forEach(i=>{const k=fn(i);if(!m.has(k))m.set(k,[]);m.get(k).push(i)});return[...m.entries()]}
function norm(d){return{employees:(Array.isArray(d.employees)?d.employees:[]).map(e=>({id:e.id||uid(),dept:str(e.dept),name:str(e.name),note:str(e.note),isDeleted:!!e.isDeleted,createdAt:numTime(e.createdAt),updatedAt:numTime(e.updatedAt)})),transactions:(Array.isArray(d.transactions)?d.transactions:[]).map(t=>({id:t.id||uid(),employeeId:t.employeeId||'',type:t.type||'use',amount:num(t.amount),beforeBalance:num(t.beforeBalance),afterBalance:num(t.afterBalance),reason:str(t.reason),note:str(t.note),targetTransactionId:t.targetTransactionId||null,signatureData:sigD(t.signatureData),signatureHash:str(t.signatureHash),createdAt:numTime(t.createdAt)})),meta:{lastBackupAt:null,orgName:DEFAULT_ORG,departments:[...DEFAULT_DEPTS],...(d.meta&&typeof d.meta==='object'?d.meta:{})}}}

// ── IndexedDB ──
async function makeRepo(){try{const db=await openDb();return makeIdbRepo(db)}catch(e){console.warn(e);return makeLocalRepo()}}
function openDb(){return new Promise((res,rej)=>{if(!window.indexedDB){rej(new Error('IndexedDB 미지원'));return}const r=indexedDB.open(DB,VER);r.onerror=()=>rej(r.error);r.onupgradeneeded=()=>{const db=r.result;if(!db.objectStoreNames.contains('employees'))db.createObjectStore('employees',{keyPath:'id'});if(!db.objectStoreNames.contains('transactions'))db.createObjectStore('transactions',{keyPath:'id'});if(!db.objectStoreNames.contains('meta'))db.createObjectStore('meta',{keyPath:'key'})};r.onsuccess=()=>res(r.result)})}
function getAll(db,s){return new Promise((res,rej)=>{const tx=db.transaction(s,'readonly'),q=tx.objectStore(s).getAll();q.onerror=()=>rej(q.error);q.onsuccess=()=>res(q.result||[])})}
function makeIdbRepo(db){return{modeLabel:'IndexedDB',async loadAll(){const[e,t,m]=await Promise.all([getAll(db,'employees'),getAll(db,'transactions'),getAll(db,'meta')]);return{employees:e,transactions:t,meta:m.reduce((a,r)=>(a[r.key]=r.value,a),{})}},async apply(c){await new Promise((res,rej)=>{const tx=db.transaction(['employees','transactions','meta'],'readwrite');tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);tx.onabort=()=>rej(tx.error);const es=tx.objectStore('employees'),ts=tx.objectStore('transactions'),ms=tx.objectStore('meta');(c.employees||[]).forEach(v=>es.put(v));(c.transactions||[]).forEach(v=>ts.put(v));if(c.meta)Object.entries(c.meta).forEach(([k,v])=>ms.put({key:k,value:v}))})},async replaceAll(d){await new Promise((res,rej)=>{const tx=db.transaction(['employees','transactions','meta'],'readwrite');tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);tx.objectStore('employees').clear();tx.objectStore('transactions').clear();tx.objectStore('meta').clear();d.employees.forEach(v=>tx.objectStore('employees').put(v));d.transactions.forEach(v=>tx.objectStore('transactions').put(v));if(d.meta)Object.entries(d.meta).forEach(([k,v])=>tx.objectStore('meta').put({key:k,value:v}))})}}}
function makeLocalRepo(){function load(){try{return JSON.parse(localStorage.getItem(LOCAL)||'{}')}catch{return{}}}function save(d){localStorage.setItem(LOCAL,JSON.stringify(d))}return{modeLabel:'localStorage (호환 모드)',async loadAll(){return load()},async apply(c){const d=load();if(c.employees)c.employees.forEach(v=>{d.employees=d.employees||[];const i=d.employees.findIndex(x=>x.id===v.id);if(i>=0)d.employees[i]=v;else d.employees.push(v)});if(c.transactions)c.transactions.forEach(v=>{d.transactions=d.transactions||[];const i=d.transactions.findIndex(x=>x.id===v.id);if(i>=0)d.transactions[i]=v;else d.transactions.push(v)});if(c.meta){d.meta=d.meta||{};Object.assign(d.meta,c.meta)}save(d)},async replaceAll(d){save(d)}}}

// ── 잔액 ──
function applyTx(b,t){return t.type==='use'?b-num(t.amount):b+num(t.amount)}
function balanceOf(id){return state.data.transactions.filter(t=>t.employeeId===id).reduce((s,t)=>applyTx(s,t),0)}
function backupDue(){return(state.data.employees.length||state.data.transactions.length)&&!sameDay(state.data.meta.lastBackupAt,now())}

// ── SHA-256 ──
async function hash(text){if(window.crypto&&window.crypto.subtle){const buf=new TextEncoder().encode(String(text)),h=await crypto.subtle.digest('SHA-256',buf);return Array.from(new Uint8Array(h)).map(v=>v.toString(16).padStart(2,'0')).join('')}let x=5381,s=String(text);for(let i=0;i<s.length;i++)x=((x<<5)+x)+s.charCodeAt(i);return String(x>>>0)}

// ── UI ──
function toast(msg){clearTimeout(state.toastTimer);state.toast=msg;render();state.toastTimer=setTimeout(()=>{state.toast='';render()},3000)}
function setBusy(msg){state.busy=msg;render()}
function clearBusy(){state.busy=''}
function field(id,label,value,ph,type){return `<div class="field"><label for="${id}">${esc(label)}</label><input id="${id}" type="${type||'text'}" value="${esc(value)}" placeholder="${esc(ph||'')}"></div>`}
function deptField(id,label,value,ph){const opts=(state.data.meta.departments||[]).map(d=>`<option value="${esc(d)}">`).join('');return `<div class="field"><label for="${id}">${esc(label)}</label><input id="${id}" list="deptList" value="${esc(value)}" placeholder="${esc(ph||'')}"><datalist id="deptList">${opts}</datalist></div>`}

// ── 렌더 (포커스 보존) ──
function render(){if(!state.loaded){qs('app').innerHTML='<div class="app"><div class="card empty">앱을 준비하는 중입니다.</div></div>';return}
const fa=document.activeElement,fid=fa&&fa.id,ss=fa&&fa.selectionStart,se=fa&&fa.selectionEnd;
const d=derive();qs('app').innerHTML=`<div class="app">${topBar()}<div class="stack">${banners()}${screenHtml(d)}</div>${navHtml()}</div>${modalHtml(d)}${state.toast?`<div class="toast">${esc(state.toast)}</div>`:''}${state.busy?`<div class="busy"><div>${esc(state.busy)}</div></div>`:''}`;
if(state.modal&&state.modal.type==='usage')initSignPad();else signPad=null;
if(fid&&!state.modal){const el=qs(fid);if(el){el.focus();try{if(typeof ss==='number'){el.selectionStart=ss;el.selectionEnd=se}}catch(e){}}}}

// ── 파생 데이터 ──
function derive(){const balances=new Map(),voided=new Set();const asc=[...state.data.transactions].sort((a,b)=>a.createdAt-b.createdAt||a.id.localeCompare(b.id));asc.forEach(t=>{const p=balances.get(t.employeeId)||0;balances.set(t.employeeId,applyTx(p,t));if(t.type==='void'&&t.targetTransactionId)voided.add(t.targetTransactionId)});const employees=state.data.employees.map(e=>({...e,balance:balances.get(e.id)||0,deptKey:e.dept||'부서 없음'})).sort((a,b)=>a.deptKey.localeCompare(b.deptKey,'ko')||a.name.localeCompare(b.name,'ko'));const empMap=new Map(employees.map(e=>[e.id,e]));const active=employees.filter(e=>!e.isDeleted);const kw=state.search.trim();const filtered=active.filter(e=>!kw||e.name.includes(kw)||e.deptKey.includes(kw));const total=active.reduce((s,e)=>s+e.balance,0);const homeGroups=groupBy(filtered,e=>e.deptKey).map(([dept,items])=>({dept,items,count:items.length,totalBalance:items.reduce((s,e)=>s+e.balance,0)})).sort((a,b)=>a.dept.localeCompare(b.dept,'ko'));const hist=[...state.data.transactions].sort((a,b)=>b.createdAt-a.createdAt||b.id.localeCompare(a.id)).filter(t=>!state.historyEmployeeId||t.employeeId===state.historyEmployeeId);const historyGroups=groupBy(hist,t=>{const e=empMap.get(t.employeeId);return(e?e.deptKey:'부서 없음')+'||'+(e?e.name:'알 수 없는 직원')+'||'+t.employeeId}).map(([key,items])=>{const[dept,name,eid]=key.split('||');return{dept,name,employeeId:eid,employee:empMap.get(eid)||null,items}}).sort((a,b)=>a.dept.localeCompare(b.dept,'ko')||a.name.localeCompare(b.name,'ko'));return{employees,empMap,active,filtered,total,homeGroups,voided,historyGroups}}

// ── 화면 HTML ──
function topBar(){const sub={home:'차감과 잔액을 빠르게 처리합니다.',history:'거래와 취소 기록을 확인합니다.',settings:'직원 관리와 백업을 처리합니다.'}[state.screen]||'';const btns=state.screen==='home'?'<button class="btn-secondary" data-a="csv-import">CSV</button><button class="btn-primary" data-a="add-employee">직원 추가</button>':'<button class="btn-primary" data-a="export">백업</button>';const search=state.screen==='home'?`<input id="searchInput" type="text" placeholder="직원명 또는 부서 검색" value="${esc(state.search)}">`:(state.screen==='history'?historyFilterHtml():'');return `<div class="top"><div class="title"><div><h1>${APP}</h1><div class="sub">${sub}</div></div><div class="tool"><button class="btn" data-a="go-home">홈</button>${btns}</div></div>${search}</div>`}
function historyFilterHtml(){const d=derive();return `<select id="historyFilter">${['<option value="">전체 직원</option>',...d.employees.map(e=>`<option value="${esc(e.id)}"${state.historyEmployeeId===e.id?' selected':''}>${esc(e.name)} (${esc(e.dept||'부서 없음')})${e.isDeleted?' [숨김]':''}</option>`)].join('')}</select>`}
function banners(){let h='';if(state.mode!=='IndexedDB')h+='<div class="card banner error"><strong>호환 모드 저장</strong><div class="meta">IndexedDB를 사용할 수 없어 localStorage에 저장합니다.</div></div>';if(backupDue())h+=`<div class="card banner warn"><strong>오늘 백업이 필요합니다</strong><div class="meta">${state.data.meta.lastBackupAt?`마지막 백업: ${dt(state.data.meta.lastBackupAt)}`:'아직 백업이 없습니다.'}</div></div>`;return h}
function screenHtml(d){if(state.screen==='history')return historyHtml(d);if(state.screen==='settings')return settingsHtml(d);return homeHtml(d)}
function homeHtml(d){if(!d.filtered.length)return `<div class="card empty">${state.search.trim()?'검색 결과가 없습니다.':'등록된 직원이 없습니다.'}<br><br><button class="btn-secondary" data-a="csv-import">CSV 불러오기</button> <button class="btn-primary" data-a="add-employee">직원 추가</button></div>`;return `${d.homeGroups.map(g=>`<div class="card group"><div class="group-head"><div><div class="group-title">${esc(g.dept)}</div><div class="group-meta">직원 ${g.count}명</div></div><div class="bal ${g.totalBalance<0?'negative':g.totalBalance===0?'zero':''}">${money(g.totalBalance)}</div></div>${g.items.map(empCard).join('')}</div>`).join('')}<div class="card summary"><div>활성 직원 ${d.active.length}명</div><div class="v">총 잔액 ${money(d.total)}</div></div>`}
function empCard(e){const c=e.balance<0?'negative':e.balance===0?'zero':'';return `<div class="card employee"><div class="employee-main" data-a="history-for" data-id="${esc(e.id)}"><div class="name">${esc(e.name)}</div><div class="dept">${esc(e.dept||'부서 없음')}${e.note?' · '+esc(e.note):''}</div><div class="bal ${c}">${money(e.balance)}</div></div><div class="actions"><button class="btn-primary" data-a="use" data-id="${esc(e.id)}">사용</button><button class="btn-secondary" data-a="topup" data-id="${esc(e.id)}">충전</button><button class="btn" data-a="adjust" data-id="${esc(e.id)}">조정</button></div></div>`}
function historyHtml(d){if(!d.historyGroups.length)return '<div class="card empty">거래 이력이 없습니다.</div>';return d.historyGroups.map(g=>`<div class="card"><div class="name">${esc(g.name)}<span class="dept" style="margin-left:8px">${esc(g.dept)}</span></div><div class="list">${g.items.map(t=>txCard(t,d)).join('')}</div></div>`).join('')}
function txCard(t,d){const lbl={open:'등록',topup:'충전',use:'사용',void:'취소',adjust:'조정'}[t.type]||t.type;const isOut=t.type==='use';const isAdj=t.type==='adjust';const isV=d.voided.has(t.id);const sign=isOut?'-':'+';const cls=isOut?'out':isAdj?'adjust':'in';const sig=t.signatureData?`<img class="thumb" src="${t.signatureData}" data-a="view-sign" data-id="${esc(t.id)}" alt="서명">`:'';const vb=t.type==='use'&&!isV?`<button class="small" data-a="void" data-id="${esc(t.id)}">취소</button>`:'';const vm=isV?'<span class="chip" style="background:var(--danger-soft);color:var(--danger)">취소됨</span>':'';const nt=t.note?`<span class="chip">${esc(t.note)}</span>`:'';return `<div class="txn" style="${isV?'opacity:.5':''}"><div class="txn-top"><div class="txn-title">${esc(lbl)}</div><div class="amt ${cls}">${sign}${money(Math.abs(t.amount))}</div></div><div class="chips"><span>${dt(t.createdAt)}</span>${nt}${vm}${t.reason&&t.type!=='use'?`<span>${esc(t.reason)}</span>`:''}</div>${sig}${vb}</div>`}
function settingsHtml(d){const rows=d.employees.length?d.employees.map(manageRow).join(''):'<div class="empty">직원이 없습니다.</div>';const org=state.data.meta.orgName||DEFAULT_ORG;const depts=state.data.meta.departments||[];return `<div class="card stack"><button class="btn-primary" data-a="add-employee">직원 추가</button><button class="btn-secondary" data-a="csv-import">CSV 불러오기</button><button class="btn-secondary" data-a="export-csv">📋 장부 내보내기 (CSV)</button><button class="btn" data-a="export">💾 앱 백업 (JSON)</button><button class="btn" data-a="import">백업 복원</button><button class="btn-warn" data-a="new-month">새 달 시작 (초기화)</button></div><div class="card"><div class="name" style="font-size:20px">부서 목록 관리</div><div class="meta" style="margin-bottom:8px">${esc(org)} · <button class="small" data-a="edit-org" style="display:inline;min-height:auto;padding:2px 8px">기관명 변경</button></div><div style="line-height:2">${depts.map((d,i)=>`<span class="dept-tag">${esc(d)}<button data-a="remove-dept" data-idx="${i}">×</button></span>`).join('')}</div><div style="display:flex;gap:8px;margin-top:8px"><input id="newDeptInput" type="text" placeholder="새 부서명 입력" style="min-height:44px"><button class="btn-secondary" data-a="add-dept" style="min-height:44px;min-width:80px;flex-shrink:0">추가</button></div></div><div class="card"><div class="name" style="font-size:20px">직원 관리</div>${rows}</div><div class="card stack"><div class="meta">저장 방식: ${esc(state.mode)}</div><div class="meta">마지막 백업: ${esc(state.data.meta.lastBackupAt?dt(state.data.meta.lastBackupAt):'없음')}</div><div class="meta">직원 수: ${d.active.length}명 (숨김 포함 ${d.employees.length}명)</div><div class="meta">거래 수: ${state.data.transactions.length}건</div><div class="meta">앱 버전: v${APP_VERSION}</div></div>`}
function manageRow(e){return `<div class="row"><div class="left"><div class="txn-title">${esc(e.name)}${e.isDeleted?'<span class="hidden-badge">숨김</span>':''}</div><div class="meta">${esc(e.dept||'부서 없음')} · 현재 잔액 ${money(e.balance)}</div>${e.note?`<div class="meta">${esc(e.note)}</div>`:''}</div><div class="right">${e.isDeleted?`<button class="small" data-a="restore-emp" data-id="${esc(e.id)}">복원</button>`:`<button class="small" data-a="edit-employee" data-id="${esc(e.id)}">수정</button><button class="small" data-a="topup" data-id="${esc(e.id)}">충전</button><button class="small" data-a="adjust" data-id="${esc(e.id)}">조정</button><button class="small" data-a="hide" data-id="${esc(e.id)}">숨김</button>`}</div></div>`}
function navHtml(){return `<div class="nav"><button class="${state.screen==='home'?'active':''}" data-a="screen" data-screen="home">홈</button><button class="${state.screen==='history'?'active':''}" data-a="screen" data-screen="history">이력</button><button class="${state.screen==='settings'?'active':''}" data-a="screen" data-screen="settings">설정</button></div>`}

function modalHtml(d){if(!state.modal)return '';
if(state.modal.type==='employee'){const edit=state.modal.mode==='edit',e=edit?d.empMap.get(state.modal.id):null;return `<div class="modal-back"><div class="modal"><h2>${edit?'직원 정보 수정':'직원 추가'}</h2><p class="help">${edit?'직원 기본 정보만 바뀝니다.':'초기 선입금액은 첫 거래로 등록됩니다.'}</p><div class="form">${deptField('empDept','부서명',e?e.dept:'','예: 보건의료과')}${field('empName','직원명',e?e.name:'','예: 홍길동')}${!edit?field('empOpen','초기 선입금액','9000','예: 9000','number'):''}${field('empNote','메모',e?e.note:'','비고')}</div><div class="modal-actions"><button class="btn" data-a="close-modal">취소</button><button class="btn-primary" data-a="save-employee">저장</button></div></div></div>`}
if(state.modal.type==='topup'){const e=d.empMap.get(state.modal.id);if(!e)return '';return `<div class="modal-back"><div class="modal"><h2>추가 충전</h2><p class="help">${esc(e.name)} · 현재 잔액 ${money(e.balance)}</p><div class="form">${field('topupAmount','충전 금액','9000','예: 9000','number')}${field('topupReason','사유','','예: 추가 선입금')}</div><div class="modal-actions"><button class="btn" data-a="close-modal">취소</button><button class="btn-primary" data-a="save-topup">충전 저장</button></div></div></div>`}
if(state.modal.type==='adjust'){const e=d.empMap.get(state.modal.id);if(!e)return '';return `<div class="modal-back"><div class="modal"><h2>잔액 조정</h2><p class="help">현재 잔액은 ${money(e.balance)}입니다.</p><div class="form">${field('adjustBalance','새 잔액',String(e.balance),'예: 27000','number')}${field('adjustReason','조정 사유','','예: 장부 확인 후 정정')}</div><div class="modal-actions"><button class="btn" data-a="close-modal">취소</button><button class="btn-warn" data-a="save-adjust">조정 저장</button></div></div></div>`}
if(state.modal.type==='usage'){const e=d.empMap.get(state.modal.id);if(!e)return '';return `<div class="modal-back"><div class="modal"><h2>사용 등록</h2><p class="help">금액을 선택한 뒤 서명을 받고 저장하세요.</p><div class="receipt"><div class="receipt-row"><span>직원</span><strong>${esc(e.name)}</strong></div><div class="receipt-row"><span>부서</span><strong>${esc(e.dept||'부서 없음')}</strong></div><div class="receipt-row"><span>현재 잔액</span><strong>${money(e.balance)}</strong></div></div><div class="form"><div class="field"><label>빠른 금액</label><div class="quick"><button data-a="fill-use" data-amount="9000">9,000원</button><button data-a="fill-use" data-amount="18000">18,000원</button><button data-a="fill-use" data-amount="27000">27,000원</button></div></div>${field('useAmount','사용 금액',state.modal.prefill||'9000','직접 입력','number')}${field('useNote','비고 (점심/저녁/특식 등)','','선택 입력')}<div class="field"><label>서명</label><div class="sig-box"><canvas id="signCanvas" class="signature"></canvas></div></div></div><div class="modal-actions"><button class="btn" data-a="clear-sign">서명 지우기</button><button class="btn" data-a="close-modal">취소</button><button class="btn-primary" data-a="save-use">서명 후 저장</button></div></div></div>`}
if(state.modal.type==='signature'){const t=state.data.transactions.find(v=>v.id===state.modal.id);if(!t||!t.signatureData)return '';const e=state.data.employees.find(v=>v.id===t.employeeId);return `<div class="modal-back"><div class="modal" style="text-align:center"><h2>서명 확인</h2><p class="help">${esc(e?e.name:'알 수 없음')} · ${dt(t.createdAt)} · ${money(t.amount)}</p><img src="${t.signatureData}" style="max-width:100%;border:1px solid var(--line);border-radius:12px;background:#fff" alt="서명"><div class="modal-actions"><button class="btn" data-a="close-modal">닫기</button></div></div></div>`}
if(state.modal.type==='csv'){const rows=state.modal.rows||[];const errs=rows.filter(r=>r.error).length;const newCount=rows.filter(r=>!r.error&&r.mode!=='topup').length;const topupCount=rows.filter(r=>!r.error&&r.mode==='topup').length;const sm=!rows.length?'':errs>0?`<div style="color:var(--danger);font-weight:700;margin:8px 0">❌ ${errs}건 오류 — 수정 후 다시 시도하세요</div>`:`<div style="color:var(--success);font-weight:700;margin:8px 0">✅ ${newCount?'신규 '+newCount+'명':''}${newCount&&topupCount?' + ':''}${topupCount?'기존 충전 '+topupCount+'명':''} — 임포트 가능</div>`;const tb=rows.length?`<div class="csv-preview"><table class="csv-table"><thead><tr><th>행</th><th>부서</th><th>이름</th><th>금액</th><th>상태</th></tr></thead><tbody>${rows.map(r=>`<tr class="${r.error?'err':''}" style="${r.mode==='topup'?'background:var(--warn-soft)':''}"><td>${r.line}</td><td>${esc(r.dept)}</td><td>${esc(r.name)}</td><td>${r.amount?money(r.amount):'-'}</td><td>${r.error||(r.mode==='topup'?'🔄 추가 충전':'✅ 신규')}</td></tr>`).join('')}</tbody></table></div>`:'';return `<div class="modal-back"><div class="modal"><h2>CSV 파일 불러오기</h2><p class="help">UTF-8 CSV 파일. 필수 컬럼: 부서, 이름, 금액 (헤더 행 필수)<br>이미 등록된 직원은 금액이 추가 충전됩니다.</p>${sm}${tb}<div class="modal-actions"><button class="btn" data-a="close-modal">취소</button>${rows.length&&!errs?'<button class="btn-primary" data-a="exec-csv">임포트 실행</button>':'<button class="btn-secondary" data-a="pick-csv">파일 선택</button>'}</div></div></div>`}
return ''}

// ── 이벤트 ──
async function onClick(e){const el=e.target.closest('[data-a]');if(!el)return;const a=el.dataset.a;
if(a==='go-home'){state.screen='home';render()}
else if(a==='screen'){state.screen=el.dataset.screen||'home';if(state.screen!=='history')state.historyEmployeeId='';render()}
else if(a==='add-employee'){state.modal={type:'employee',mode:'add'};render()}
else if(a==='edit-employee'){state.modal={type:'employee',mode:'edit',id:el.dataset.id};render()}
else if(a==='topup'){state.modal={type:'topup',id:el.dataset.id};render()}
else if(a==='adjust'){state.modal={type:'adjust',id:el.dataset.id};render()}
else if(a==='use'){state.modal={type:'usage',id:el.dataset.id,prefill:'9000'};render()}
else if(a==='history-for'){state.historyEmployeeId=el.dataset.id||'';state.screen='history';render()}
else if(a==='view-sign'){state.modal={type:'signature',id:el.dataset.id};render()}
else if(a==='close-modal'){state.modal=null;render()}
else if(a==='fill-use'){const i=qs('useAmount');if(i)i.value=el.dataset.amount||''}
else if(a==='clear-sign'){if(signPad)signPad.clear()}
else if(a==='save-employee'){await saveEmployee()}
else if(a==='save-topup'){await saveTopup()}
else if(a==='save-adjust'){await saveAdjust()}
else if(a==='save-use'){await saveUse()}
else if(a==='hide'){await hideEmployee(el.dataset.id)}
else if(a==='restore-emp'){await restoreEmployee(el.dataset.id)}
else if(a==='void'){await voidUsage(el.dataset.id)}
else if(a==='export'){await exportBackup()}
else if(a==='export-csv'){await exportCsvLedger()}
else if(a==='import'){qs('restoreFile').value='';qs('restoreFile').click()}
else if(a==='csv-import'){state.modal={type:'csv',rows:[]};render()}
else if(a==='pick-csv'){qs('csvFile').value='';qs('csvFile').click()}
else if(a==='exec-csv'){await executeCsvImport()}
else if(a==='new-month'){await doNewMonth()}
else if(a==='edit-org'){await editOrgName()}
else if(a==='add-dept'){await addDept()}
else if(a==='remove-dept'){await removeDept(Number(el.dataset.idx))}}
function onInput(e){if(e.target.id==='searchInput'){state.search=e.target.value||'';if(!composing)render()}if(e.target.id==='historyFilter'){state.historyEmployeeId=e.target.value||'';render()}}

// ── CRUD ──
async function saveEmployee(){const dept=str(qs('empDept')&&qs('empDept').value),name=str(qs('empName')&&qs('empName').value),note=str(qs('empNote')&&qs('empNote').value),t=now();if(!name){toast('직원명을 입력하세요.');return}if(state.modal.mode==='edit'){const old=state.data.employees.find(v=>v.id===state.modal.id);if(!old){toast('직원을 찾을 수 없습니다.');return}const dup=state.data.employees.find(v=>v.id!==old.id&&!v.isDeleted&&v.name===name&&v.dept===dept);if(dup){toast('같은 이름과 부서의 활성 직원이 이미 있습니다.');return}const next={...old,dept,name,note,updatedAt:t};try{await repo.apply({employees:[next]});upsertEmp(next);state.modal=null;render();toast('직원 정보를 수정했습니다.')}catch(err){console.error(err);toast('직원 수정 중 오류')}}else{const hidden=state.data.employees.find(v=>v.isDeleted&&v.name===name&&v.dept===dept);if(hidden){toast('같은 이름의 숨김 직원이 있습니다. 설정에서 복원하세요.');return}const dup=state.data.employees.find(v=>!v.isDeleted&&v.name===name&&v.dept===dept);if(dup){toast('같은 이름과 부서의 직원이 이미 있습니다.');return}const open=num(qs('empOpen')&&qs('empOpen').value);if(open<0){toast('초기 선입금액은 0원 이상이어야 합니다.');return}const emp={id:uid(),dept,name,note,isDeleted:false,createdAt:t,updatedAt:t};const txs=open>0?[{id:uid(),employeeId:emp.id,type:'open',amount:open,beforeBalance:0,afterBalance:open,reason:'초기 선입금 등록',note:'',targetTransactionId:null,signatureData:'',signatureHash:'',createdAt:t}]:[];try{await repo.apply({employees:[emp],transactions:txs});upsertEmp(emp);txs.forEach(upsertTx);state.modal=null;render();toast('직원을 등록했습니다.')}catch(err){console.error(err);toast('직원 등록 중 오류')}}}
async function saveTopup(){const emp=state.data.employees.find(v=>v.id===state.modal.id&&!v.isDeleted);if(!emp){toast('직원을 찾을 수 없습니다.');return}const amount=num(qs('topupAmount')&&qs('topupAmount').value),reason=str(qs('topupReason')&&qs('topupReason').value)||'추가 선입금';if(amount<=0){toast('충전 금액을 올바르게 입력하세요.');return}const before=balanceOf(emp.id),tx={id:uid(),employeeId:emp.id,type:'topup',amount,beforeBalance:before,afterBalance:before+amount,reason,note:'',targetTransactionId:null,signatureData:'',signatureHash:'',createdAt:now()};try{await repo.apply({transactions:[tx]});upsertTx(tx);state.modal=null;render();toast('충전을 저장했습니다.')}catch(err){console.error(err);toast('충전 저장 중 오류')}}
async function saveAdjust(){const emp=state.data.employees.find(v=>v.id===state.modal.id&&!v.isDeleted);if(!emp){toast('직원을 찾을 수 없습니다.');return}const newBal=num(qs('adjustBalance')&&qs('adjustBalance').value),reason=str(qs('adjustReason')&&qs('adjustReason').value);if(newBal<0){toast('새 잔액은 0원 이상이어야 합니다.');return}if(!reason){toast('조정 사유를 입력하세요.');return}const before=balanceOf(emp.id),delta=newBal-before;if(delta===0){toast('현재 잔액과 동일합니다.');return}const tx={id:uid(),employeeId:emp.id,type:'adjust',amount:delta,beforeBalance:before,afterBalance:newBal,reason,note:'',targetTransactionId:null,signatureData:'',signatureHash:'',createdAt:now()};try{await repo.apply({transactions:[tx]});upsertTx(tx);state.modal=null;render();toast('잔액 조정을 저장했습니다.')}catch(err){console.error(err);toast('잔액 조정 중 오류')}}
async function saveUse(){const emp=state.data.employees.find(v=>v.id===state.modal.id&&!v.isDeleted);if(!emp){toast('직원을 찾을 수 없습니다.');return}const amount=num(qs('useAmount')&&qs('useAmount').value);if(amount<=0){toast('사용 금액을 올바르게 입력하세요.');return}const before=balanceOf(emp.id);if(before<amount){toast('잔액이 부족합니다.');return}if(!signPad||signPad.isEmpty()){toast('서명을 먼저 받아주세요.');return}const signatureData=signPad.toDataUrl();if(!signatureData){toast('서명을 저장할 수 없습니다.');return}const note=str(qs('useNote')&&qs('useNote').value);setBusy('서명을 저장하는 중입니다.');try{const signatureHash=await hash(signatureData),tx={id:uid(),employeeId:emp.id,type:'use',amount,beforeBalance:before,afterBalance:before-amount,reason:'서명 확인',note,targetTransactionId:null,signatureData,signatureHash,createdAt:now()};await repo.apply({transactions:[tx]});upsertTx(tx);state.modal=null;clearBusy();render();toast('사용 등록이 저장되었습니다.')}catch(err){console.error(err);clearBusy();toast('사용 등록 중 오류')}}
async function hideEmployee(id){const emp=state.data.employees.find(v=>v.id===id);if(!emp)return;const typed=window.prompt(`${emp.name} 직원을 숨김 처리하려면 이름을 입력하세요.`,'');if(typed===null)return;if(str(typed)!==emp.name){toast('이름이 일치하지 않습니다.');return}const next={...emp,isDeleted:true,updatedAt:now()};try{await repo.apply({employees:[next]});upsertEmp(next);render();toast('숨김 처리됨')}catch(err){console.error(err);toast('오류')}}
async function restoreEmployee(id){const emp=state.data.employees.find(v=>v.id===id);if(!emp)return;const dup=state.data.employees.find(v=>v.id!==emp.id&&!v.isDeleted&&v.name===emp.name&&v.dept===emp.dept);if(dup){toast('같은 이름의 활성 직원이 있어 복원 불가');return}if(!window.confirm(`${emp.name} 직원을 복원할까요?`))return;const next={...emp,isDeleted:false,updatedAt:now()};try{await repo.apply({employees:[next]});upsertEmp(next);render();toast('복원됨')}catch(err){console.error(err);toast('오류')}}
async function voidUsage(id){const tx=state.data.transactions.find(v=>v.id===id&&v.type==='use');if(!tx)return;const already=state.data.transactions.some(v=>v.type==='void'&&v.targetTransactionId===tx.id);if(already){toast('이미 취소됨');return}const reason=window.prompt('취소 사유를 입력하세요.','');if(reason===null)return;if(!str(reason)){toast('취소 사유를 입력하세요.');return}const before=balanceOf(tx.employeeId),voidTx={id:uid(),employeeId:tx.employeeId,type:'void',amount:tx.amount,beforeBalance:before,afterBalance:before+tx.amount,reason:str(reason),note:'',targetTransactionId:tx.id,signatureData:'',signatureHash:'',createdAt:now()};try{await repo.apply({transactions:[voidTx]});upsertTx(voidTx);render();toast('사용 취소 완료')}catch(err){console.error(err);toast('오류')}}

// ── 백업/복원 ──
async function exportBackup(){setBusy('백업 파일을 만드는 중입니다.');try{const core={version:1,appName:APP,appVersion:APP_VERSION,exportedAt:now(),employees:state.data.employees,transactions:state.data.transactions,meta:{...state.data.meta}};const checksum=await hash(JSON.stringify(core));const payload={...core,checksum};const json=JSON.stringify(payload,null,2);const fn=backupFileName();downloadFile(json,fn);const lastBackupAt=now();await repo.apply({meta:{lastBackupAt}});state.data.meta.lastBackupAt=lastBackupAt;clearBusy();render();toast('백업 저장됨')}catch(err){console.error(err);clearBusy();toast('백업 생성 오류')}}

// ── 장부 내보내기 (CSV) ──
async function exportCsvLedger(){
const d=derive();const org=state.data.meta.orgName||DEFAULT_ORG;
const today=new Date();const dateStr=`${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
const csvQ=v=>{const s=String(v==null?'':v);return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s};
const row=arr=>arr.map(csvQ).join(',')+'\r\n';
let csv='';
// ── 1. 요약 정보 ──
csv+=row([`${org} 선입금 장부`,'','',`출력일: ${dateStr}`]);
csv+=row([`활성 직원: ${d.active.length}명`,'',`총 잔액: ${money(d.total)}`,'']);
csv+=row([]);
// ── 2. 직원별 잔액 현황 ──
csv+=row(['【 직원별 잔액 현황 】','','','']);
csv+=row(['부서','직원명','잔액','메모']);
d.homeGroups.forEach(g=>{
g.items.forEach(e=>{csv+=row([e.dept,e.name,num(e.balance),e.note||''])});
csv+=row([`  ${g.dept} 소계`,'',num(g.totalBalance),'']);
});
csv+=row(['합계','',num(d.total),'']);
csv+=row([]);
// ── 3. 거래 내역 ──
csv+=row(['【 거래 내역 】','','','','','']);
csv+=row(['일시','부서','직원명','유형','금액','잔액(후)','비고/사유']);
const typeNames={open:'등록',topup:'충전',use:'사용',void:'취소',adjust:'조정'};
const allTx=[...state.data.transactions].sort((a,b)=>a.createdAt-b.createdAt);
allTx.forEach(t=>{
const e=state.data.employees.find(v=>v.id===t.employeeId);
const dept=e?e.dept:'';const name=e?e.name:'알 수 없음';
const typeName=typeNames[t.type]||t.type;
const sign=t.type==='use'?'-':'';
const memo=[t.note,t.reason].filter(Boolean).join(' / ');
const isVoided=state.data.transactions.some(v=>v.type==='void'&&v.targetTransactionId===t.id);
csv+=row([dt(t.createdAt),dept,name,typeName+(isVoided?' (취소됨)':''),sign+num(Math.abs(t.amount)),num(t.afterBalance),memo]);
});
csv+=row([]);
csv+=row([`총 거래 ${allTx.length}건`,'','','','','','']);
// BOM + UTF-8로 다운로드 (엑셀에서 한글 깨짐 방지)
const bom='\uFEFF';
const blob=new Blob([bom+csv],{type:'text/csv;charset=utf-8'});
const url=URL.createObjectURL(blob);const a=document.createElement('a');
const fn=`선입금장부_${org}_${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}.csv`;
a.href=url;a.download=fn;a.click();setTimeout(()=>URL.revokeObjectURL(url),1000);
toast('장부 CSV 저장됨');
}
function backupFileName(){const d=new Date();return `선입금대장_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`}
function downloadFile(content,filename){if(typeof AndroidBridge!=='undefined'&&AndroidBridge.saveBackup){AndroidBridge.saveBackup(content,filename);return}const blob=new Blob([content],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=filename;a.click();setTimeout(()=>URL.revokeObjectURL(url),1000)}
window.onBackupSaved=function(fn){toast('백업 저장 완료: '+fn)};
async function onRestoreFile(e){const file=e.target.files&&e.target.files[0];if(!file)return;setBusy('백업 파일을 읽는 중입니다.');try{const text=await file.text(),parsed=JSON.parse(text);if(!parsed||!Array.isArray(parsed.employees)||!Array.isArray(parsed.transactions))throw new Error('형식 오류');const core={version:parsed.version,appName:parsed.appName,appVersion:parsed.appVersion,exportedAt:parsed.exportedAt,employees:parsed.employees,transactions:parsed.transactions,meta:parsed.meta||{}};const checksum=parsed.checksum||'',calc=await hash(JSON.stringify(core));const data=norm({employees:parsed.employees,transactions:parsed.transactions,meta:parsed.meta||{}});const ec=data.employees.filter(v=>!v.isDeleted).length,tc=data.transactions.length;clearBusy();let warn='';if(checksum&&checksum!==calc)warn='\n\n⚠️ 체크섬 불일치. 파일이 수정되었을 수 있습니다.';const ok=window.confirm(`복원 미리보기\n\n직원 수: ${ec}명\n거래 수: ${tc}건${warn}\n\n현재 데이터를 이 백업으로 바꿀까요?`);if(!ok)return;const safety={employees:[...state.data.employees],transactions:[...state.data.transactions],meta:{...state.data.meta}};setBusy('복원 중입니다.');try{await repo.replaceAll(data);state.data=data;state.screen='home';state.search='';state.historyEmployeeId='';clearBusy();render();toast('백업 복원 완료')}catch(re){console.error(re);try{await repo.replaceAll(safety);state.data=safety}catch(e2){console.error('롤백 실패:',e2)}clearBusy();render();toast('복원 실패. 이전 데이터로 복구됨')}}catch(err){console.error(err);clearBusy();toast('백업 파일을 읽을 수 없습니다.')}finally{qs('restoreFile').value=''}}
window.onRestoreData=function(json){try{const p=JSON.parse(json);/* 동일 로직 적용 */}catch(e){toast('복원 실패')}};

// ── CSV 임포트 ──
function parseCsvLine(line){const f=[];let c='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'&&!q)q=true;else if(ch==='"'&&q){if(line[i+1]==='"'){c+='"';i++}else q=false}else if(ch===','&&!q){f.push(c);c=''}else c+=ch}f.push(c);return f.map(s=>s.trim())}
function parseAmount(raw){const s=raw.replace(/"/g,'').replace(/,/g,'').replace(/원/g,'').replace(/\s/g,'').trim();if(!s)return null;const n=parseFloat(s);return isNaN(n)||n<=0?null:n}
async function onCsvFile(e){const file=e.target.files&&e.target.files[0];if(!file)return;try{
// 인코딩 자동 감지: UTF-8 → EUC-KR 폴백
const buf=await file.arrayBuffer();let text;
try{text=new TextDecoder('utf-8',{fatal:true}).decode(buf)}catch(ue){try{text=new TextDecoder('euc-kr',{fatal:true}).decode(buf)}catch(ke){toast('파일 인코딩을 인식할 수 없습니다.');return}}
if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
const allLines=text.split(/\r?\n/);const nonEmpty=allLines.filter(l=>l.trim());
if(nonEmpty.length<2){toast('데이터 없음');return}

// 메타데이터에서 부서명 추출 (예: "급량비(보건의료과)" 또는 "부서: 보건의료과")
let metaDept='';
for(let i=0;i<Math.min(nonEmpty.length,5);i++){const l=nonEmpty[i];
const m1=l.match(/부서\s*[:：]\s*(.+)/);if(m1){metaDept=m1[1].trim().replace(/,.*$/,'');break}
const m2=l.match(/[급량비비용]\(([^)]+)\)/);if(m2){metaDept=m2[1].trim();break}
const m3=l.match(/\(([가-힣]+[과동부국소])\)/);if(m3&&!metaDept){metaDept=m3[1].trim()}}

// 헤더 행 찾기 (첫 번째로 '이름|성명|직원' 컬럼이 있는 행)
let headerIdx=-1,headers=[];
for(let i=0;i<Math.min(nonEmpty.length,10);i++){const cols=parseCsvLine(nonEmpty[i]).map(h=>h.replace(/\s/g,''));
if(cols.some(h=>/이름|성명|직원명/.test(h))&&cols.some(h=>/금액|선입금|입금/.test(h))){headerIdx=i;headers=cols;break}}
if(headerIdx<0){toast('필수 컬럼(이름/직원명, 금액)을 찾을 수 없습니다.\n헤더 행이 있는지 확인하세요.');return}

// 컬럼 매핑 (부서 컬럼은 선택적)
const di=headers.findIndex(h=>/부서/.test(h));
const ni=headers.findIndex(h=>/이름|성명|직원명/.test(h));
const ai=headers.findIndex(h=>/금액|선입금|입금/.test(h));
if(ni<0||ai<0){toast('이름/금액 컬럼을 찾을 수 없습니다.');return}

// 부서 컬럼이 없으면 메타데이터에서 추출한 부서 사용
const hasDeptCol=di>=0;
if(!hasDeptCol&&!metaDept){
// 마지막 시도: 파일 전체에서 "부서:" 패턴 찾기
for(const l of nonEmpty){const m=l.match(/부서\s*[:：]\s*(.+)/);if(m){metaDept=m[1].trim().replace(/,.*$/,'');break}}}

// 데이터 행 파싱
const ex=new Set(state.data.employees.filter(v=>!v.isDeleted).map(v=>v.dept+'|'+v.name));
const rows=[];
for(let i=headerIdx+1;i<nonEmpty.length;i++){const f=parseCsvLine(nonEmpty[i]);
const dept=hasDeptCol?(f[di]||'').trim():metaDept;
const name=(f[ni]||'').trim();const ar=f[ai]||'';
if(/합계|소계|총계|total|합\s*계/i.test(name+dept+(f[0]||'')))continue;
if(!name)continue;
const amount=parseAmount(ar);let error='',mode='new',existId='';
if(!dept)error='부서명 없음 (CSV에 부서 컬럼이 없고 메타데이터에서도 찾을 수 없음)';
else if(!amount)error='금액 오류: "'+ar+'"';
else if(ex.has(dept+'|'+name)){mode='topup';const existEmp=state.data.employees.find(v=>!v.isDeleted&&v.dept===dept&&v.name===name);if(existEmp)existId=existEmp.id}
rows.push({dept:dept||'(없음)',name,amount,error,line:i+1,mode:error?'error':mode,existId})}
if(!rows.length){toast('임포트할 직원이 없습니다.');return}
state.modal={type:'csv',rows};render()}catch(err){console.error(err);toast('파일 읽기 실패: '+err.message)}finally{qs('csvFile').value=''}}
async function executeCsvImport(){const rows=(state.modal&&state.modal.rows||[]).filter(r=>!r.error);if(!rows.length)return;const newRows=rows.filter(r=>r.mode!=='topup');const topupRows=rows.filter(r=>r.mode==='topup');const msg=[];if(newRows.length)msg.push('신규 '+newRows.length+'명');if(topupRows.length)msg.push('추가 충전 '+topupRows.length+'명');if(!window.confirm(`${msg.join(' + ')}을 처리하시겠습니까?`))return;setBusy('처리하는 중입니다.');try{const t=now();const emps=[],txs=[];
newRows.forEach(r=>{const eid=uid();emps.push({id:eid,dept:r.dept,name:r.name,note:'',isDeleted:false,createdAt:t,updatedAt:t});if(r.amount>0)txs.push({id:uid(),employeeId:eid,type:'open',amount:r.amount,beforeBalance:0,afterBalance:r.amount,reason:'CSV 임포트',note:'',targetTransactionId:null,signatureData:'',signatureHash:'',createdAt:t+Math.random()})});
topupRows.forEach(r=>{if(!r.existId||!r.amount)return;const before=balanceOf(r.existId);txs.push({id:uid(),employeeId:r.existId,type:'topup',amount:r.amount,beforeBalance:before,afterBalance:before+r.amount,reason:'CSV 추가 충전',note:dt(t),targetTransactionId:null,signatureData:'',signatureHash:'',createdAt:t+Math.random()})});
await repo.apply({employees:emps,transactions:txs});emps.forEach(upsertEmp);txs.forEach(upsertTx);state.modal=null;clearBusy();render();toast(`${msg.join(' + ')} 완료`)}catch(err){console.error(err);clearBusy();toast('임포트 오류')}}

// ── 새 달 시작 ──
async function doNewMonth(){if(!state.data.transactions.length){toast('초기화할 거래 내역이 없습니다.');return}if(!window.confirm('⚠️ 새 달 시작\n\n1. 현재 데이터를 백업합니다\n2. 모든 거래내역을 삭제합니다\n3. 잔액이 0으로 초기화됩니다\n4. 직원 목록은 유지됩니다\n\n계속하시겠습니까?'))return;await exportBackup();if(!window.confirm('백업이 저장되었습니까?\n확인 후 거래내역을 삭제합니다.\n\n⚠️ 이 작업은 되돌릴 수 없습니다.'))return;const data={...state.data,transactions:[]};try{await repo.replaceAll(data);state.data=data;render();toast('새 달 시작 · 거래내역 초기화됨')}catch(err){console.error(err);toast('초기화 오류')}}

// ── 부서 관리 ──
async function editOrgName(){const cur=state.data.meta.orgName||DEFAULT_ORG;const v=window.prompt('기관명을 입력하세요.',cur);if(v===null||!str(v))return;state.data.meta.orgName=str(v);await repo.apply({meta:{orgName:state.data.meta.orgName}});render();toast('기관명 변경됨')}
async function addDept(){const input=qs('newDeptInput');const name=str(input&&input.value);if(!name){toast('부서명을 입력하세요.');return}const depts=state.data.meta.departments||[];if(depts.includes(name)){toast('이미 등록된 부서');return}depts.push(name);state.data.meta.departments=depts;await repo.apply({meta:{departments:depts}});render();toast(`${name} 추가됨`)}
async function removeDept(idx){const depts=state.data.meta.departments||[];if(idx<0||idx>=depts.length)return;const name=depts[idx];if(!window.confirm(`"${name}" 부서를 목록에서 제거할까요?\n(기존 직원의 부서명은 변경되지 않습니다)`))return;depts.splice(idx,1);state.data.meta.departments=depts;await repo.apply({meta:{departments:depts}});render();toast(`${name} 제거됨`)}

// ── 헬퍼 ──
function upsertEmp(e){const i=state.data.employees.findIndex(v=>v.id===e.id);if(i>=0)state.data.employees[i]=e;else state.data.employees.push(e)}
function upsertTx(t){const i=state.data.transactions.findIndex(v=>v.id===t.id);if(i>=0)state.data.transactions[i]=t;else state.data.transactions.push(t)}

// ── 서명 패드 (JPEG 0.5) ──
function initSignPad(){const canvas=qs('signCanvas');if(!canvas||canvas.dataset.ready==='1')return;const ctx=canvas.getContext('2d');const ratio=Math.max(window.devicePixelRatio||1,1),w=canvas.clientWidth||600,h=canvas.clientHeight||180;canvas.width=Math.floor(w*ratio);canvas.height=Math.floor(h*ratio);ctx.scale(ratio,ratio);canvas.dataset.ready='1';let drawing=false,empty=true;const paint=()=>{ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);ctx.strokeStyle='#d7dde4';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(16,h-32);ctx.lineTo(w-16,h-32);ctx.stroke()};const point=e=>{const r=canvas.getBoundingClientRect(),p=e.touches?e.touches[0]:e;return{x:p.clientX-r.left,y:p.clientY-r.top}};const start=e=>{e.preventDefault();drawing=true;const p=point(e);ctx.beginPath();ctx.moveTo(p.x,p.y)};const move=e=>{if(!drawing)return;e.preventDefault();empty=false;const p=point(e);ctx.lineWidth=3;ctx.lineCap='round';ctx.strokeStyle='#1f2933';ctx.lineTo(p.x,p.y);ctx.stroke()};const end=()=>{drawing=false};paint();canvas.addEventListener('mousedown',start);canvas.addEventListener('mousemove',move);canvas.addEventListener('mouseup',end);canvas.addEventListener('mouseleave',end);canvas.addEventListener('touchstart',start,{passive:false});canvas.addEventListener('touchmove',move,{passive:false});canvas.addEventListener('touchend',end);signPad={clear(){empty=true;ctx.setTransform(ratio,0,0,ratio,0,0);ctx.clearRect(0,0,w,h);paint()},isEmpty(){return empty},toDataUrl(){return empty?'':canvas.toDataURL('image/jpeg',0.5)}}}

// ── 초기화 ──
async function init(){setBusy('저장소를 준비하는 중입니다.');repo=await makeRepo();state.mode=repo.modeLabel;state.data=norm(await repo.loadAll());state.loaded=true;clearBusy();render()}
})();
