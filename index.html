<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1f4e79">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>선입금대장</title>
<style>
:root{--bg:#f0f2f5;--card:#fff;--line:#e1e5ea;--text:#1b2838;--muted:#5f6d7e;--primary:#1a5276;--primary-soft:#e6f0f8;--primary-glow:rgba(26,82,118,.08);--danger:#c0392b;--danger-soft:#fef0ee;--warn:#c05621;--warn-soft:#fef6ee;--success:#0e7a46;--success-soft:#edf8f2;--shadow:0 1px 4px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.03);--shadow-md:0 4px 12px rgba(15,23,42,.08);--shadow-lg:0 12px 32px rgba(15,23,42,.12);--radius:14px}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","Apple SD Gothic Neo","Segoe UI",sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}body{min-height:100vh}button,input,select{font:inherit}button{border:none;cursor:pointer;border-radius:12px;min-height:52px;transition:transform .1s,opacity .12s}button:active{transform:scale(.97);opacity:.82}input,select{width:100%;min-height:52px;padding:13px 16px;border:1.5px solid var(--line);border-radius:12px;background:#fff;transition:border-color .2s,box-shadow .2s}input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow);outline:none}

/* ─── 레이아웃 ─── */
.app{max-width:900px;margin:0 auto;padding:16px 16px 90px}
.top{position:sticky;top:0;z-index:10;background:rgba(240,242,245,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:14px 0 12px;border-bottom:1px solid rgba(225,229,234,.5)}
.title{display:flex;gap:10px;align-items:start;justify-content:space-between}
.title h1{margin:0;font-size:22px;font-weight:800;letter-spacing:-.4px;background:linear-gradient(135deg,var(--primary),#2874a6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{margin-top:3px;color:var(--muted);font-size:12px;letter-spacing:.2px}
.tool{display:flex;gap:6px;flex-wrap:wrap}
.tool button{min-height:38px;padding:0 13px;font-size:13px;font-weight:700;border-radius:10px}

/* ─── 버튼 ─── */
.btn{background:#fff;border:1.5px solid var(--line);color:var(--text)}
.btn-primary{background:linear-gradient(135deg,var(--primary),#1e6fa1);color:#fff;border:none;box-shadow:0 2px 6px rgba(26,82,118,.2)}
.btn-secondary{background:var(--primary-soft);color:var(--primary);border:1.5px solid #ccdce8}
.btn-danger{background:var(--danger);color:#fff;border:none}
.btn-warn{background:var(--warn-soft);color:var(--warn);border:1.5px solid #e8c9a0}

/* ─── 카드 ─── */
.stack{display:grid;gap:10px}
.card{background:var(--card);border:1px solid rgba(225,229,234,.7);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
.banner{border-left:4px solid}
.banner.warn{background:var(--warn-soft);border-left-color:var(--warn)}
.banner.error{background:var(--danger-soft);border-left-color:var(--danger)}

/* ─── 부서 그룹 ─── */
.group{display:grid;gap:8px}
.group-head{display:flex;justify-content:space-between;gap:12px;align-items:center;padding-bottom:8px;border-bottom:1.5px solid #eef1f4}
.group-title{font-size:18px;font-weight:800;letter-spacing:-.2px;color:var(--primary)}
.group-meta{color:var(--muted);font-size:12px;font-weight:600}

/* ─── 직원 카드 ─── */
.employee{display:grid;gap:10px}
.employee-main{cursor:pointer;border-radius:10px;padding:4px;margin:-4px;transition:background .15s}
.employee-main:active{background:var(--primary-soft)}
.name{font-size:17px;font-weight:800;line-height:1.3;letter-spacing:-.2px}
.dept,.meta,.note{color:var(--muted);font-size:12px;line-height:1.5}
.bal{margin-top:0;font-size:24px;font-weight:800;color:var(--primary);letter-spacing:-.5px}
.bal.zero{color:#a0aab4}
.bal.negative{color:var(--danger)}

/* ─── 요약/액션 ─── */
.actions{display:flex;gap:8px;flex-wrap:wrap}
.actions button{flex:1;min-width:100px;font-size:16px;font-weight:700}
.summary{display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:15px;font-weight:700;padding:6px 4px;background:var(--primary-soft);border-radius:10px;margin-top:4px}
.summary .v{color:var(--primary);font-size:19px;letter-spacing:-.3px;font-weight:800}
.empty{text-align:center;color:var(--muted);padding:32px 16px;line-height:1.7;font-size:15px}

/* ─── 거래 이력 ─── */
.list{display:grid;gap:8px}
.txn{display:grid;gap:6px;padding:10px 0;border-bottom:1px solid #f0f2f5}
.txn:last-child{border-bottom:none}
.txn-top{display:flex;justify-content:space-between;gap:10px;align-items:start}
.txn-title{font-size:15px;font-weight:700;line-height:1.4}
.amt{font-size:20px;font-weight:800;white-space:nowrap;letter-spacing:-.3px}
.amt.in{color:var(--success)}
.amt.out{color:var(--danger)}
.amt.adjust{color:var(--warn)}
.chips{display:flex;gap:6px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
.chip{padding:3px 8px;border-radius:999px;background:var(--primary-soft);color:var(--primary);font-weight:600;font-size:11px}
.thumb{width:80px;height:44px;object-fit:contain;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;transition:border-color .15s}
.thumb:active{border-color:var(--primary)}

/* ─── 직원 관리 행 ─── */
.row{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid #eef1f4}
.row:last-child{border-bottom:0}
.row .left{flex:1;min-width:0}
.row .right{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.small{min-height:36px;padding:0 10px;border:1.5px solid var(--line);background:#fff;font-size:12px;font-weight:700;border-radius:8px}
.hidden-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:999px;background:#eef1f4;color:var(--muted);font-size:11px;font-weight:700;margin-left:4px}

/* ─── 하단 탭 ─── */
.nav{position:fixed;left:0;right:0;bottom:0;max-width:900px;margin:0 auto;display:flex;background:rgba(255,255,255,.96);border-top:1px solid rgba(225,229,234,.8);box-shadow:0 -2px 8px rgba(15,23,42,.04);z-index:20;padding-bottom:env(safe-area-inset-bottom,0);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.nav button{flex:1;min-height:58px;border-radius:0;background:transparent;color:#a0aab4;font-size:11px;font-weight:700;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:color .15s}
.nav button:active{transform:none;opacity:1}
.nav button.active{color:var(--primary)}
.nav button svg{width:22px;height:22px;stroke-width:2;fill:none;stroke:currentColor}

/* ─── 모달 ─── */
.modal-back{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;padding:16px;z-index:40;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.modal{width:min(100%,640px);max-height:calc(100vh - 32px);overflow:auto;background:#fff;border-radius:18px;box-shadow:var(--shadow-lg);padding:20px}
.modal h2{margin:0 0 4px;font-size:20px;font-weight:800;letter-spacing:-.3px}
.help{margin:0 0 14px;color:var(--muted);font-size:13px;line-height:1.6}
.field{display:grid;gap:4px}
.field label{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.form{display:grid;gap:12px}
.quick{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.quick button{font-size:16px;font-weight:700;background:var(--primary-soft);color:var(--primary);border:1.5px solid #ccdce8}
.receipt{display:grid;gap:6px;padding:14px;border:1.5px solid var(--line);border-radius:12px;background:#fafbfd;margin-bottom:12px}
.receipt-row{display:flex;justify-content:space-between;gap:12px;font-size:15px}
.signature{width:100%;height:180px;display:block;background:#fff;touch-action:none}
.sig-box{border:1.5px solid var(--line);border-radius:12px;overflow:hidden}
.modal-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.modal-actions button{flex:1;font-size:16px;font-weight:700}

/* ─── 토스트/로딩 ─── */
.toast{position:fixed;left:50%;top:16px;transform:translateX(-50%);max-width:calc(100vw - 32px);padding:12px 20px;border-radius:14px;background:rgba(27,40,56,.9);color:#fff;box-shadow:var(--shadow-lg);z-index:60;text-align:center;line-height:1.4;font-size:14px;font-weight:600;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.busy{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.65);z-index:70;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.busy>div{background:#fff;padding:24px 36px;border-radius:18px;box-shadow:var(--shadow-lg);font-size:16px;font-weight:700;text-align:center}

/* ─── CSV 미리보기 ─── */
.csv-preview{max-height:280px;overflow-y:auto;margin:12px 0;border:1px solid var(--line);border-radius:10px}
.csv-table{width:100%;border-collapse:collapse;font-size:12px}
.csv-table th{background:var(--primary);color:#fff;padding:8px 10px;text-align:left;position:sticky;top:0;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px}
.csv-table td{padding:7px 10px;border-bottom:1px solid #eef1f4}
.csv-table tr.err{background:var(--danger-soft)}
.csv-table tr.err td{color:var(--danger)}

/* ─── 부서 태그/선택 ─── */
.dept-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;background:var(--primary-soft);color:var(--primary);font-size:12px;font-weight:600;margin:3px}
.dept-tag button{background:none;border:none;color:var(--danger);font-size:15px;min-height:auto;padding:0 2px;cursor:pointer;border-radius:0}
.dept-picks{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;max-height:130px;overflow-y:auto}
.dept-pick{padding:5px 11px;border-radius:999px;background:#fff;border:1.5px solid var(--line);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.dept-pick.on{background:var(--primary-soft);border-color:var(--primary);color:var(--primary)}
.dept-pick:active{transform:scale(.95)}

/* ─── 직원 관리 아코디언 ─── */
.mgr-group{border-bottom:1px solid #eef1f4}
.mgr-group:last-child{border-bottom:none}
.mgr-head{display:flex;align-items:center;gap:8px;padding:11px 4px;cursor:pointer;font-weight:700;border-radius:8px;transition:background .15s}
.mgr-head:active{background:var(--bg)}
.mgr-toggle{font-size:10px;color:var(--muted);width:16px;text-align:center;flex-shrink:0}
.mgr-dept{font-size:14px;flex:1}
.mgr-count{font-size:12px;color:var(--muted);font-weight:600}
.mgr-body{padding:0 0 4px 20px}

/* ─── PIN 화면 ─── */
.pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(160deg,#f0f2f5 0%,#e6eaf0 100%)}
.pin-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--primary),#2874a6);display:flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 4px 12px rgba(26,82,118,.25)}
.pin-icon svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2}
.pin-title{font-size:20px;font-weight:800;margin-bottom:4px;color:var(--text);letter-spacing:-.3px}
.pin-sub{font-size:13px;color:var(--muted);margin-bottom:28px;text-align:center;line-height:1.5}
.pin-dots{display:flex;gap:14px;margin-bottom:32px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #c8ced6;background:#fff;transition:all .2s}
.pin-dot.filled{background:var(--primary);border-color:var(--primary);transform:scale(1.15)}
.pin-dot.error{background:var(--danger);border-color:var(--danger);animation:shake .3s}
.pin-pad{display:grid;grid-template-columns:repeat(3,68px);gap:10px;justify-content:center}
.pin-key{width:68px;height:68px;border-radius:50%;background:#fff;border:1px solid #dce0e6;font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;min-height:auto;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:all .1s}
.pin-key:active{background:var(--primary-soft);border-color:var(--primary);transform:scale(.93)}
.pin-key.fn{background:transparent;border:none;font-size:14px;color:var(--muted);font-weight:600;box-shadow:none}
.pin-key.fn:active{background:var(--bg);transform:scale(.95)}
.pin-msg{margin-top:18px;font-size:13px;color:var(--danger);text-align:center;min-height:20px;font-weight:600}
.pin-reset{margin-top:20px;text-align:center}
.pin-reset button{min-height:auto;padding:8px 16px;font-size:12px;color:var(--muted);background:none;border:1px solid var(--line);border-radius:8px}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
@media(max-width:640px){.quick{grid-template-columns:1fr}.actions button,.modal-actions button{min-width:100%}.summary,.txn-top,.receipt-row,.row,.group-head{display:grid}.tool{width:100%}.tool button{flex:1}}
</style>
</head>
<body>
<div id="app"></div>
<input id="restoreFile" type="file" accept="application/json,.json" hidden>
<input id="csvFile" type="file" accept=".csv,.txt" hidden>
<script>
(()=>{
'use strict';
const APP='선입금대장',APP_VERSION='2.3.3',DB='prepaid-ledger-db',VER=2,LOCAL='prepaid-ledger-local',now=()=>Date.now(),qs=i=>document.getElementById(i);
const DEFAULT_ORG='광진구청';
const DEFAULT_DEPTS=['감사담당관','홍보담당관','행정지원과','자치행정과','민원여권과','재무과','스마트정보과','기획예산과','지역경제과','일자리청년과','세무1과','세무2과','문화예술과','체육진흥과','교육지원과','평생교육과','복지정책과','사회복지장애인과','어르신복지과','가정복지과','아동청소년과','도시안전과','청소과','환경과','가로경관과','주택과','주거사업과','도시계획과','건축과','부동산정보과','교통행정과','교통지도과','도로과','치수과','공원녹지과','보건정책과','보건위생과','보건의료과','건강관리과'];
const state={loaded:false,mode:'준비 중',screen:'home',search:'',deptFilter:'',historyTab:'date',historyEmployeeId:'',modal:null,toast:'',toastTimer:null,busy:'',expandedDepts:{},pinLocked:true,pinInput:'',pinFails:0,pinMode:'',pinSetup1:'',pinMsg:'',backupConfirmed:false,data:{employees:[],transactions:[],meta:{lastBackupAt:null,orgName:DEFAULT_ORG,shopName:'',departments:[...DEFAULT_DEPTS]}}};
let repo,signPad=null;
document.addEventListener('click',onClick);document.addEventListener('input',onInput);document.addEventListener('change',onInput);qs('restoreFile').addEventListener('change',onRestoreFile);qs('csvFile').addEventListener('change',onCsvFile);
let composing=false;document.addEventListener('compositionstart',()=>{composing=true});document.addEventListener('compositionend',(e)=>{composing=false;onInput(e)});
init();

// ── 유틸리티 ──
function num(v){const n=Number(v);return Number.isFinite(n)?n:0}
function parseWon(v){const s=String(v==null?'':v).replace(/,/g,'').replace(/원/g,'').replace(/\s/g,'').trim();if(!s)return NaN;const n=Number(s);if(!Number.isFinite(n))return NaN;if(!Number.isInteger(n))return NaN;return n}
function numTime(v){const n=Number(v);return Number.isFinite(n)&&n>0?n:now()}
function str(v){return typeof v==='string'?v.trim():''}
function sigD(v){return typeof v==='string'&&/^data:image\//.test(v)?v:''}
function uid(){return 'id-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,9)}
function esc(v){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function money(v){return num(v).toLocaleString('ko-KR')+'원'}
function dt(ts){if(!ts)return '-';const d=new Date(ts),y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0'),h=String(d.getHours()).padStart(2,'0'),mi=String(d.getMinutes()).padStart(2,'0');return `${y}.${m}.${dd} ${h}:${mi}`}
function sameDay(a,b){if(!a||!b)return false;const x=new Date(a),y=new Date(b);return x.getFullYear()===y.getFullYear()&&x.getMonth()===y.getMonth()&&x.getDate()===y.getDate()}
function groupBy(items,fn){const m=new Map();items.forEach(i=>{const k=fn(i);if(!m.has(k))m.set(k,[]);m.get(k).push(i)});return[...m.entries()]}
function norm(d){return{employees:(Array.isArray(d.employees)?d.employees:[]).map(e=>({id:e.id||uid(),dept:str(e.dept),name:str(e.name),note:str(e.note),isDeleted:!!e.isDeleted,createdAt:numTime(e.createdAt),updatedAt:numTime(e.updatedAt)})),transactions:(Array.isArray(d.transactions)?d.transactions:[]).map(t=>({id:t.id||uid(),employeeId:t.employeeId||'',type:t.type||'use',amount:num(t.amount),beforeBalance:num(t.beforeBalance),afterBalance:num(t.afterBalance),reason:str(t.reason),note:str(t.note),targetTransactionId:t.targetTransactionId||null,signatureData:sigD(t.signatureData),signatureHash:str(t.signatureHash),createdAt:numTime(t.createdAt)})),meta:{lastBackupAt:null,orgName:DEFAULT_ORG,shopName:'',departments:[...DEFAULT_DEPTS],...(d.meta&&typeof d.meta==='object'?d.meta:{})}}}

// ── IndexedDB ──
async function makeRepo(){try{const db=await openDb();return makeIdbRepo(db)}catch(e){console.error('IndexedDB 오류:',e);return null}}
function openDb(){return new Promise((res,rej)=>{if(!window.indexedDB){rej(new Error('IndexedDB 미지원'));return}const r=indexedDB.open(DB,VER);r.onerror=()=>rej(r.error);r.onupgradeneeded=()=>{const db=r.result;if(!db.objectStoreNames.contains('employees'))db.createObjectStore('employees',{keyPath:'id'});if(!db.objectStoreNames.contains('transactions'))db.createObjectStore('transactions',{keyPath:'id'});if(!db.objectStoreNames.contains('meta'))db.createObjectStore('meta',{keyPath:'key'})};r.onsuccess=()=>res(r.result)})}
function getAll(db,s){return new Promise((res,rej)=>{const tx=db.transaction(s,'readonly'),q=tx.objectStore(s).getAll();q.onerror=()=>rej(q.error);q.onsuccess=()=>res(q.result||[])})}
function makeIdbRepo(db){return{modeLabel:'IndexedDB',async loadAll(){const[e,t,m]=await Promise.all([getAll(db,'employees'),getAll(db,'transactions'),getAll(db,'meta')]);return{employees:e,transactions:t,meta:m.reduce((a,r)=>(a[r.key]=r.value,a),{})}},async apply(c){await new Promise((res,rej)=>{const tx=db.transaction(['employees','transactions','meta'],'readwrite');tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);tx.onabort=()=>rej(tx.error);const es=tx.objectStore('employees'),ts=tx.objectStore('transactions'),ms=tx.objectStore('meta');(c.employees||[]).forEach(v=>es.put(v));(c.transactions||[]).forEach(v=>ts.put(v));if(c.meta)Object.entries(c.meta).forEach(([k,v])=>ms.put({key:k,value:v}))})},async replaceAll(d){await new Promise((res,rej)=>{const tx=db.transaction(['employees','transactions','meta'],'readwrite');tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);tx.objectStore('employees').clear();tx.objectStore('transactions').clear();tx.objectStore('meta').clear();d.employees.forEach(v=>tx.objectStore('employees').put(v));d.transactions.forEach(v=>tx.objectStore('transactions').put(v));if(d.meta)Object.entries(d.meta).forEach(([k,v])=>tx.objectStore('meta').put({key:k,value:v}))})}}}
function makeLocalRepo(){function load(){try{return JSON.parse(localStorage.getItem(LOCAL)||'{}')}catch{return{}}}function save(d){localStorage.setItem(LOCAL,JSON.stringify(d))}return{modeLabel:'localStorage (호환 모드)',async loadAll(){return load()},async apply(c){const d=load();if(c.employees)c.employees.forEach(v=>{d.employees=d.employees||[];const i=d.employees.findIndex(x=>x.id===v.id);if(i>=0)d.employees[i]=v;else d.employees.push(v)});if(c.transactions)c.transactions.forEach(v=>{d.transactions=d.transactions||[];const i=d.transactions.findIndex(x=>x.id===v.id);if(i>=0)d.transactions[i]=v;else d.transactions.push(v)});if(c.meta){d.meta=d.meta||{};Object.assign(d.meta,c.meta)}save(d)},async replaceAll(d){save(d)}}}

// ── 잔액 ──
function applyTx(b,t){return t.type==='use'?b-num(t.amount):b+num(t.amount)}
function balanceOf(id){return state.data.transactions.filter(t=>t.employeeId===id).reduce((s,t)=>applyTx(s,t),0)}
function backupDue(){return(state.data.employees.length||state.data.transactions.length)&&!sameDay(state.data.meta.lastBackupAt,now())}

// ── SHA-256 ──
async function hash(text){if(window.crypto&&window.crypto.subtle){const buf=new TextEncoder().encode(String(text)),h=await crypto.subtle.digest('SHA-256',buf);return Array.from(new Uint8Array(h)).map(v=>v.toString(16).padStart(2,'0')).join('')}let x=5381,s=String(text);for(let i=0;i<s.length;i++)x=((x<<5)+x)+s.charCodeAt(i);return String(x>>>0)}

function pinScreenHtml(){
const hasPin=!!state.data.meta.pinHash;
const isSetup=!hasPin||state.pinMode==='change';
const step=isSetup?(state.pinSetup1?'confirm':'new'):'unlock';
const titles={new:'비밀번호 설정',confirm:'비밀번호 확인',unlock:'비밀번호 입력'};
const subs={new:'숫자 4자리를 입력하세요',confirm:'한번 더 입력하세요',unlock:'비밀번호를 입력하세요'};
const dots=[0,1,2,3].map(i=>`<div class="pin-dot${i<state.pinInput.length?' filled':''}${state.pinMsg&&state.pinMsg.includes('틀렸습니다')?' error':''}"></div>`).join('');
const keys=[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" data-a="pin-key" data-key="${n}">${n}</button>`).join('');
const resetBtn=state.pinFails>=5?`<div class="pin-reset"><div style="color:var(--danger);font-size:13px;margin-bottom:8px">5회 이상 실패했습니다</div><button data-a="pin-reset">비밀번호 초기화</button><div style="font-size:11px;color:var(--muted);margin-top:6px">초기화하면 비밀번호가 삭제됩니다.<br>데이터는 유지됩니다.</div></div>`:'';
return `<div class="pin-screen"><div class="pin-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div><div class="pin-title">${titles[step]}</div><div class="pin-sub">${subs[step]}</div><div class="pin-dots">${dots}</div><div class="pin-pad">${keys}<button class="pin-key fn" data-a="pin-key" data-key="back">←</button><button class="pin-key" data-a="pin-key" data-key="0">0</button><button class="pin-key fn" data-a="pin-key" data-key="clear">C</button></div><div class="pin-msg">${esc(state.pinMsg)}</div>${resetBtn}</div>`}

async function handlePinKey(key){
if(key==='clear'){state.pinInput='';state.pinMsg='';render();return}
if(key==='back'){state.pinInput=state.pinInput.slice(0,-1);state.pinMsg='';render();return}
if(state.pinInput.length>=4)return;
state.pinInput+=key;state.pinMsg='';render();
if(state.pinInput.length<4)return;
const pin=state.pinInput;const hasPin=!!state.data.meta.pinHash;
const isSetup=!hasPin||state.pinMode==='change';
if(isSetup){
if(!state.pinSetup1){state.pinSetup1=pin;state.pinInput='';render();return}
if(state.pinSetup1!==pin){state.pinSetup1='';state.pinInput='';state.pinMsg='비밀번호가 일치하지 않습니다. 다시 설정하세요.';render();return}
const h=await hash(pin);state.data.meta.pinHash=h;await repo.apply({meta:{pinHash:h}});
state.pinInput='';state.pinSetup1='';state.pinMode='';state.pinLocked=false;state.pinFails=0;state.pinMsg='';render();toast('비밀번호가 설정되었습니다.')
}else{
const h=await hash(pin);
if(h===state.data.meta.pinHash){state.pinInput='';state.pinLocked=false;state.pinFails=0;state.pinMsg='';render()}
else{state.pinFails++;state.pinInput='';state.pinMsg=`비밀번호가 틀렸습니다. (${state.pinFails}회)`;render()}}}

async function pinReset(){if(!window.confirm('비밀번호를 초기화하시겠습니까?\n\n비밀번호가 삭제되고 새로 설정할 수 있습니다.\n저장된 데이터는 그대로 유지됩니다.'))return;
state.data.meta.pinHash='';await repo.apply({meta:{pinHash:''}});
state.pinInput='';state.pinSetup1='';state.pinMode='';state.pinFails=0;state.pinMsg='';state.pinLocked=true;render();toast('비밀번호가 초기화되었습니다. 새로 설정하세요.')}

function txCardDate(t,d){const e=d.empMap.get(t.employeeId);const eName=e?e.name:'알 수 없음';const eDept=e?e.deptKey:'';const lbl={open:'등록',topup:'충전',use:'사용',void:'취소',adjust:'조정'}[t.type]||t.type;const isOut=t.type==='use';const isAdj=t.type==='adjust';const isV=d.voided.has(t.id);const adjNeg=isAdj&&num(t.amount)<0;const sign=isOut?'-':adjNeg?'':'+';const cls=isOut?'out':isAdj?'adjust':'in';const sig=t.signatureData?`<img class="thumb" src="${t.signatureData}" data-a="view-sign" data-id="${esc(t.id)}" alt="서명">`:'';const vb=t.type==='use'&&!isV?`<button class="small" data-a="void" data-id="${esc(t.id)}">취소</button>`:'';const vm=isV?'<span class="chip" style="background:var(--danger-soft);color:var(--danger)">취소됨</span>':'';const nt=t.note?`<span class="chip">${esc(t.note)}</span>`:'';const time=new Date(t.createdAt);const hm=String(time.getHours()).padStart(2,'0')+':'+String(time.getMinutes()).padStart(2,'0');return `<div class="txn" style="${isV?'opacity:.5':''}"><div class="txn-top"><div><div class="txn-title">${esc(eName)} <span style="font-weight:400;color:var(--muted);font-size:11px">${esc(eDept)} · ${esc(lbl)}</span></div></div><div class="amt ${cls}">${sign}${money(isAdj?t.amount:Math.abs(t.amount))}</div></div><div class="chips"><span>${hm}</span>${nt}${vm}${t.reason&&t.type!=='use'?`<span>${esc(t.reason)}</span>`:''}</div>${sig}${vb}</div>`}

function settingsHtml(d){const org=state.data.meta.orgName||DEFAULT_ORG;const depts=state.data.meta.departments||[];
// 부서별 그룹화 (활성 직원)
const activeEmps=d.employees.filter(e=>!e.isDeleted).sort((a,b)=>a.deptKey.localeCompare(b.deptKey,'ko')||a.name.localeCompare(b.name,'ko'));

return ''}

// ── 이벤트 ──
async function onClick(e){const el=e.target.closest('[data-a]');if(!el)return;const a=el.dataset.a;
if(a==='go-home'){state.screen='home';state.search='';state.deptFilter='';render()}
else if(a==='reset-filter'){state.search='';state.deptFilter='';render()}
else if(a==='screen'){state.screen=el.dataset.screen||'home';if(state.screen!=='history')state.historyEmployeeId='';render()}
else if(a==='add-employee'){state.modal={type:'employee',mode:'add'};render()}
else if(a==='edit-employee'){state.modal={type:'employee',mode:'edit',id:el.dataset.id};render()}
else if(a==='topup'){state.modal={type:'topup',id:el.dataset.id};render()}
else if(a==='adjust'){state.modal={type:'adjust',id:el.dataset.id};render()}
else if(a==='use'){state.modal={type:'usage',id:el.dataset.id};render()}
else if(a==='history-for'){state.historyEmployeeId=el.dataset.id||'';state.historyTab='employee';state.screen='history';render()}
else if(a==='history-tab'){state.historyTab=el.dataset.tab||'date';if(state.historyTab==='date')state.historyEmployeeId='';render()}
else if(a==='view-sign'){state.modal={type:'signature',id:el.dataset.id};render()}
else if(a==='close-modal'){state.modal=null;render()}
else if(a==='fill-use'){const i=qs('useAmount');if(i)i.value=el.dataset.amount||''}
else if(a==='fill-open'){const i=qs('empOpen');if(i)i.value=el.dataset.amount||''}
else if(a==='pick-dept'){const input=qs('empDept');if(input){input.value=el.dataset.dept||'';input.focus()}document.querySelectorAll('.dept-pick').forEach(c=>c.classList.toggle('on',c.dataset.dept===el.dataset.dept))}
else if(a==='clear-sign'){if(signPad)signPad.clear()}
else if(a==='save-employee'){await saveEmployee()}
else if(a==='save-topup'){await saveTopup()}
else if(a==='save-adjust'){await saveAdjust()}
else if(a==='save-use'){await saveUse()}
else if(a==='hide'){await hideEmployee(el.dataset.id)}
else if(a==='restore-emp'){await restoreEmployee(el.dataset.id)}
else if(a==='void'){await voidUsage(el.dataset.id)}
else if(a==='export'){await exportBackup()}
else if(a==='export-csv'){await exportCsvLedger()}
else if(a==='import'){qs('restoreFile').value='';qs('restoreFile').click()}
else if(a==='csv-import'){state.modal={type:'csv',rows:[]};render()}
else if(a==='pick-csv'){qs('csvFile').value='';qs('csvFile').click()}
else if(a==='exec-csv'){await executeCsvImport()}
else if(a==='new-month'){await doNewMonth()}
else if(a==='edit-org'){await editOrgName()}
else if(a==='save-shop'){await saveShopName()}
else if(a==='add-dept'){await addDept()}
else if(a==='remove-dept'){await removeDept(Number(el.dataset.idx))}
else if(a==='toggle-dept'){const dept=el.dataset.dept;state.expandedDepts[dept]=!state.expandedDepts[dept];render()}
else if(a==='pin-key'){await handlePinKey(el.dataset.key)}
else if(a==='pin-reset'){await pinReset()}
else if(a==='change-pin'){state.pinMode='change';state.pinLocked=true;state.pinInput='';state.pinSetup1='';state.pinMsg='';state.pinFails=0;render()}
else if(a==='full-reset'){await fullReset()}}
function onInput(e){if(e.target.id==='searchInput'){state.search=e.target.value||'';if(!composing)render()}if(e.target.id==='deptFilterSelect'){state.deptFilter=e.target.value||'';render()}if(e.target.id==='historyFilter'){state.historyEmployeeId=e.target.value||'';render()}}

ctionId:null,signatureData:'',signatureHash:'',createdAt:t}]:[];try{await repo.apply({employees:[emp],transactions:txs});upsertEmp(emp);txs.forEach(upsertTx);state.modal=null;render();toast('직원을 등록했습니다.')}catch(err){console.error(err);toast('직원 등록 중 오류')}}}

// ── CSV 임포트 ──
function parseCsvLine(line){const f=[];let c='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'&&!q)q=true;else if(ch==='"'&&q){if(line[i+1]==='"'){c+='"';i++}else q=false}else if(ch===','&&!q){f.push(c);c=''}else c+=ch}f.push(c);return f.map(s=>s.trim())}
function parseAmount(raw){const n=parseWon(raw);return isNaN(n)||n<=0?null:n}
async function onCsvFile(e){const file=e.target.files&&e.target.files[0];if(!file)return;try{
// 인코딩 자동 감지: UTF-8 → EUC-KR 폴백
const buf=await file.arrayBuffer();let text;
try{text=new TextDecoder('utf-8',{fatal:true}).decode(buf)}catch(ue){try{text=new TextDecoder('euc-kr',{fatal:true}).decode(buf)}catch(ke){toast('파일 인코딩을 인식할 수 없습니다.');return}}
if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
const allLines=text.split(/\r?\n/);const nonEmpty=allLines.filter(l=>l.trim());
if(nonEmpty.length<2){toast('데이터 없음');return}

// 메타데이터에서 부서명 추출 (예: "급량비(보건의료과)" 또는 "부서: 보건의료과")
let metaDept='';
for(let i=0;i<Math.min(nonEmpty.length,5);i++){const l=nonEmpty[i];
const m1=l.match(/부서\s*[:：]\s*(.+)/);if(m1){metaDept=m1[1].trim().replace(/,.*$/,'');break}
const m2=l.match(/[급량비비용]\(([^)]+)\)/);if(m2){metaDept=m2[1].trim();break}
const m3=l.match(/\(([가-힣]+[과동부국소])\)/);if(m3&&!metaDept){metaDept=m3[1].trim()}}

// 헤더 행 찾기 (첫 번째로 '이름|성명|직원' 컬럼이 있는 행)
let headerIdx=-1,headers=[];
for(let i=0;i<Math.min(nonEmpty.length,10);i++){const cols=parseCsvLine(nonEmpty[i]).map(h=>h.replace(/\s/g,''));
if(cols.some(h=>/이름|성명|직원명/.test(h))&&cols.some(h=>/금액|선입금|입금/.test(h))){headerIdx=i;headers=cols;break}}
if(headerIdx<0){toast('필수 컬럼(이름/직원명, 금액)을 찾을 수 없습니다.\n헤더 행이 있는지 확인하세요.');return}

// 컬럼 매핑 (부서 컬럼은 선택적)
const di=headers.findIndex(h=>/부서/.test(h));
const ni=headers.findIndex(h=>/이름|성명|직원명/.test(h));
const ai=headers.findIndex(h=>/금액|선입금|입금/.test(h));
if(ni<0||ai<0){toast('이름/금액 컬럼을 찾을 수 없습니다.');return}

// 부서 컬럼이 없으면 메타데이터에서 추출한 부서 사용
const hasDeptCol=di>=0;
if(!hasDeptCol&&!metaDept){
// 마지막 시도: 파일 전체에서 "부서:" 패턴 찾기
for(const l of nonEmpty){const m=l.match(/부서\s*[:：]\s*(.+)/);if(m){metaDept=m[1].trim().replace(/,.*$/,'');break}}}

// 데이터 행 파싱
const ex=new Set(state.data.employees.filter(v=>!v.isDeleted).map(v=>v.dept+'|'+v.name));
const rows=[];
for(let i=headerIdx+1;i<nonEmpty.length;i++){const f=parseCsvLine(nonEmpty[i]);
const dept=hasDeptCol?(f[di]||'').trim():metaDept;
const name=(f[ni]||'').trim();const ar=f[ai]||'';
if(/합계|소계|총계|total|합\s*계/i.test(name+dept+(f[0]||'')))continue;
if(!name)continue;
const amount=parseAmount(ar);let error='',mode='new',existId='';
if(!dept)error='부서명 없음 (CSV에 부서 컬럼이 없고 메타데이터에서도 찾을 수 없음)';
else if(!amount)error='금액 오류: "'+ar+'"';
else if(ex.has(dept+'|'+name)){mode='topup';const existEmp=state.data.employees.find(v=>!v.isDeleted&&v.dept===dept&&v.name===name);if(existEmp)existId=existEmp.id}
rows.push({dept:dept||'(없음)',name,amount,error,line:i+1,mode:error?'error':mode,existId})}
if(!rows.length){toast('임포트할 직원이 없습니다.');return}
state.modal={type:'csv',rows};render()}catch(err){console.error(err);toast('파일 읽기 실패: '+err.message)}finally{qs('csvFile').value=''}}
async function executeCsvImport(){const rows=(state.modal&&state.modal.rows||[]).filter(r=>!r.error);if(!rows.length)return;const newRows=rows.filter(r=>r.mode!=='topup');const topupRows=rows.filter(r=>r.mode==='topup');const msg=[];if(newRows.length)msg.push('신규 '+newRows.length+'명');if(topupRows.length)msg.push('추가 충전 '+topupRows.length+'명');if(!window.confirm(`${msg.join(' + ')}을 처리하시겠습니까?`))return;setBusy('처리하는 중입니다.');try{const t=now();const emps=[],txs=[];
newRows.forEach(r=>{const eid=uid();emps.push({id:eid,dept:r.dept,name:r.name,note:'',isDeleted:false,createdAt:t,updatedAt:t});if(r.amount>0)txs.push({id:uid(),employeeId:eid,type:'open',amount:r.amount,beforeBalance:0,afterBalance:r.amount,reason:'CSV 임포트',note:'',targetTransactionId:null,signatureData:'',signatureHash:'',createdAt:t+Math.random()})});
topupRows.forEach(r=>{if(!r.existId||!r.amount)return;const before=balanceOf(r.existId);txs.push({id:uid(),employeeId:r.existId,type:'topup',amount:r.amount,beforeBalance:before,afterBalance:before+r.amount,reason:'CSV 추가 충전',note:dt(t),targetTransactionId:null,signatureData:'',signatureHash:'',createdAt:t+Math.random()})});
await repo.apply({employees:emps,transactions:txs});emps.forEach(upsertEmp);txs.forEach(upsertTx);state.modal=null;clearBusy();render();toast(`${msg.join(' + ')} 완료`)}catch(err){console.error(err);clearBusy();toast('임포트 오류')}}

// ── 앱 초기화 ──
async function fullReset(){
// Step 1: 1차 확인
const ac=state.data.employees.filter(v=>!v.isDeleted).length;
const tc=state.data.transactions.length;
if(!window.confirm('⚠️ 앱 초기화\n\n현재 데이터가 모두 삭제됩니다.\n• 직원 정보 : '+ac+'명\n• 거래 내역 : '+tc+'건 (서명 이미지 포함)\n• PIN 비밀번호\n\n이 작업은 되돌릴 수 없습니다.\n계속하시겠습니까?'))return;
// Step 2: PIN 입력 확인 (PIN 미설정 시 빈값 엔터 허용)
const storedPin=state.data.meta.pinHash||'';
const pinMsg=storedPin?'정말로 초기화하시려면 현재 PIN 번호(4자리)를 입력하세요.':'PIN이 설정되어 있지 않습니다.\n그대로 엔터를 누르면 초기화가 진행됩니다.';
const typed=window.prompt(pinMsg,'');
if(typed===null)return;
if(storedPin){
const typedHash=await hash(typed);
if(typedHash!==storedPin){toast('PIN이 일치하지 않아 초기화가 취소되었습니다.');return}
}else{
if(typed!==''){toast('PIN이 설정되어 있지 않습니다. 빈칸 상태로 확인해 주세요.');return}
}
// Step 3: 삭제 실행
setBusy('초기화 중입니다.');
try{
const emptyData={employees:[],transactions:[],meta:{lastBackupAt:null,orgName:DEFAULT_ORG,shopName:'',departments:[...DEFAULT_DEPTS]}};
await repo.replaceAll(emptyData);
// Service Worker 캐시 삭제 (best-effort)
if('caches' in window){try{const ks=await caches.keys();await Promise.all(ks.map(k=>caches.delete(k)))}catch(e){console.warn('cache clear:',e)}}
// Service Worker 등록 해제 (best-effort)
if('serviceWorker' in navigator){try{const rs=await navigator.serviceWorker.getRegistrations();await Promise.all(rs.map(r=>r.unregister()))}catch(e){console.warn('sw unregister:',e)}}
// state 초기화
state.data=emptyData;
state.pinLocked=true;state.pinInput='';state.pinSetup1='';state.pinMode='';state.pinFails=0;state.pinMsg='';
state.screen='home';state.search='';state.deptFilter='';state.historyEmployeeId='';state.modal=null;state.expandedDepts={};
clearBusy();render();
// Step 4: 완료 안내
window.alert('✅ 초기화 완료\n\n모든 앱 데이터가 삭제되었습니다.')
}catch(err){console.error(err);clearBusy();toast('초기화 중 오류가 발생했습니다.')}}

// ── 새 달 시작 ──
async function doNewMonth(){if(!state.data.transactions.length){toast('초기화할 거래 내역이 없습니다.');return}if(!window.confirm('⚠️ 새 달 시작\n\n1. 현재 데이터를 백업합니다\n2. 모든 거래내역을 삭제합니다\n3. 잔액이 0으로 초기화됩니다\n4. 직원 목록은 유지됩니다\n\n계속하시겠습니까?'))return;state.backupConfirmed=false;await exportBackup();if(!state.backupConfirmed){toast('백업이 확인되지 않았습니다. 백업 저장을 먼저 확인해 주세요.');return}if(!window.confirm('백업이 저장되었습니다.\n거래내역을 삭제합니다.\n\n⚠️ 이 작업은 되돌릴 수 없습니다.'))return;const data={...state.data,transactions:[]};try{await repo.replaceAll(data);state.data=data;render();toast('새 달 시작 · 거래내역 초기화됨')}catch(err){console.error(err);toast('초기화 오류')}}


// ── 부서 관리 ──
async function editOrgName(){const cur=state.data.meta.orgName||DEFAULT_ORG;const v=window.prompt('기관명을 입력하세요.',cur);if(v===null||!str(v))return;state.data.meta.orgName=str(v);await repo.apply({meta:{orgName:state.data.meta.orgName}});render();toast('기관명 변경됨')}
async function saveShopName(){const input=qs('shopNameInput');const name=str(input&&input.value);state.data.meta.shopName=name;await repo.apply({meta:{shopName:name}});render();toast(name?`"${name}" 저장됨`:'음식점 이름이 삭제되었습니다')}
async function addDept(){const input=qs('newDeptInput');const name=str(input&&input.value);if(!name){toast('부서명을 입력하세요.');return}const depts=state.data.meta.departments||[];if(depts.includes(name)){toast('이미 등록된 부서');return}depts.push(name);state.data.meta.departments=depts;await repo.apply({meta:{departments:depts}});render();toast(`${name} 추가됨`)}
async function removeDept(idx){const depts=state.data.meta.departments||[];if(idx<0||idx>=depts.length)return;const name=depts[idx];if(!window.confirm(`"${name}" 부서를 목록에서 제거할까요?\n(기존 직원의 부서명은 변경되지 않습니다)`))return;depts.splice(idx,1);state.data.meta.departments=depts;await repo.apply({meta:{departments:depts}});render();toast(`${name} 제거됨`)}

// ── 헬퍼 ──
function upsertEmp(e){const i=state.data.employees.findIndex(v=>v.id===e.id);if(i>=0)state.data.employees[i]=e;else state.data.employees.push(e)}
function upsertTx(t){const i=state.data.transactions.findIndex(v=>v.id===t.id);if(i>=0)state.data.transactions[i]=t;else state.data.transactions.push(t)}

// ── 서명 패드 (JPEG 0.5) ──
function initSignPad(){const canvas=qs('signCanvas');if(!canvas||canvas.dataset.ready==='1')return;const ctx=canvas.getContext('2d');const ratio=Math.max(window.devicePixelRatio||1,1),w=canvas.clientWidth||600,h=canvas.clientHeight||180;canvas.width=Math.floor(w*ratio);canvas.height=Math.floor(h*ratio);ctx.scale(ratio,ratio);canvas.dataset.ready='1';let drawing=false,empty=true;const paint=()=>{ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);ctx.strokeStyle='#d7dde4';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(16,h-32);ctx.lineTo(w-16,h-32);ctx.stroke()};const point=e=>{const r=canvas.getBoundingClientRect(),p=e.touches?e.touches[0]:e;return{x:p.clientX-r.left,y:p.clientY-r.top}};const start=e=>{e.preventDefault();drawing=true;const p=point(e);ctx.beginPath();ctx.moveTo(p.x,p.y)};const move=e=>{if(!drawing)return;e.preventDefault();empty=false;const p=point(e);ctx.lineWidth=3;ctx.lineCap='round';ctx.strokeStyle='#1f2933';ctx.lineTo(p.x,p.y);ctx.stroke()};const end=()=>{drawing=false};paint();canvas.addEventListener('mousedown',start);canvas.addEventListener('mousemove',move);canvas.addEventListener('mouseup',end);canvas.addEventListener('mouseleave',end);canvas.addEventListener('touchstart',start,{passive:false});canvas.addEventListener('touchmove',move,{passive:false});canvas.addEventListener('touchend',end);signPad={clear(){empty=true;ctx.setTransform(ratio,0,0,ratio,0,0);ctx.clearRect(0,0,w,h);paint()},isEmpty(){return empty},toDataUrl(){return empty?'':canvas.toDataURL('image/jpeg',0.5)}}}

// ── Service Worker 등록 ──
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}

// ── 초기화 ──
async function init(){setBusy('저장소를 준비하는 중입니다.');repo=await makeRepo();if(!repo){clearBusy();qs('app').innerHTML='<div class="pin-screen"><div class="pin-icon" style="background:linear-gradient(135deg,var(--danger),#e74c3c)"><svg viewBox="0 0 24 24" style="width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div><div class="pin-title">저장소 오류</div><div class="pin-sub">이 브라우저/기기에서 IndexedDB를 사용할 수 없습니다.<br><br>선입금대장은 안정적인 데이터 저장을 위해<br>IndexedDB가 필수입니다.<br><br><strong>해결 방법:</strong><br>① Chrome 최신 버전을 사용하세요<br>② 시크릿/사생활 모드가 아닌지 확인하세요<br>③ 브라우저 설정에서 저장공간을 확인하세요</div></div>';return}state.mode=repo.modeLabel;state.data=norm(await repo.loadAll());state.loaded=true;clearBusy();render()}
})();
</script>
